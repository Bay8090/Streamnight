<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Streamnight · P2P 4K · 50 Mbps</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Interfaz principal estilo Streamnight */
        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 20% 20%, #1a1a1a, #000000);
        }

        /* Header con logo y controles */
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 30;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 10px #00ffff);
        }

        .logo-text {
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, #fff 0%, #00ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-badge {
            background: #00ffff;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .peer-id {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: #00ffff;
            color: #000;
            transform: scale(1.05);
        }

        /* Contenedor principal con video y chat */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Área de video */
        .video-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay de información */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
        }

        .quality-badge {
            background: rgba(0, 255, 255, 0.9);
            color: #000;
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 8px;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }

        /* Heat overlay */
        .heat-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 4px;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            border-radius: 4px;
            opacity: 0.7;
            z-index: 25;
        }

        /* Chat lateral */
        .chat-sidebar {
            width: 300px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 40;
        }

        .chat-sidebar.collapsed {
            transform: translateX(300px);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #00ffff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
        }

        .message.own {
            align-self: flex-end;
        }

        .message-header {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.own .message-bubble {
            background: #00ffff;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message:not(.own) .message-bubble {
            background: rgba(30, 30, 30, 0.9);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            font-size: 13px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ffff;
        }

        .chat-send {
            width: 45px;
            height: 45px;
            border-radius: 45px;
            background: #00ffff;
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-send:hover {
            transform: scale(1.1);
            background: #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }

        /* Barra de herramientas inferior */
        .toolbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            display: flex;
            gap: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            z-index: 30;
        }

        .tool-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
        }

        .tool-btn.primary {
            background: #00ffff;
            color: #000;
            border: none;
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.3);
        }

        .tool-btn.primary:hover {
            background: #00ffff;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 255, 255, 0.5);
        }

        /* Modal de invitación */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #00ffff;
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .link-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .link-box input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: monospace;
            font-size: 12px;
        }

        .copy-btn {
            background: #00ffff;
            border: none;
            color: #000;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .chat-sidebar {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                transform: translateX(100%);
            }
            
            .chat-sidebar.active {
                transform: translateX(0);
            }
            
            .stats-grid {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🌙</span>
            <span class="logo-text">Streamnight</span>
            <span class="logo-badge">50 Mbps</span>
        </div>
        <div class="header-actions">
            <span class="peer-id" id="peerIdDisplay">Conectando...</span>
            <button class="btn-icon" onclick="toggleChat()">💬</button>
            <button class="btn-icon" onclick="showInvite()">👥</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <!-- Video area -->
        <div class="video-area">
            <video id="videoPlayer" playsinline webkit-playsinline></video>
            
            <!-- Overlays -->
            <div class="video-overlay">
                <div class="quality-badge" id="qualityBadge">
                    🌙 4K HDR · 50 Mbps
                </div>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat">
                        <span class="stat-dot"></span>
                        <span id="bitrateStat">50 Mbps</span>
                    </div>
                    <div class="stat">
                        <span>⏱️</span>
                        <span id="latencyStat">0ms</span>
                    </div>
                    <div class="stat">
                        <span>📦</span>
                        <span id="bufferStat">0%</span>
                    </div>
                </div>
            </div>
            
            <!-- Heat overlay -->
            <div class="heat-overlay" id="heatOverlay"></div>
        </div>

        <!-- Chat sidebar -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-header">
                <h3>Chat · <span id="viewerCount">0</span> viewers</h3>
                <button class="btn-icon" onclick="toggleChat()" style="width:30px;height:30px;">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="chat-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Toolbar inferior -->
    <div class="toolbar">
        <input type="file" id="fileInput" hidden accept="video/*" onchange="startBroadcasting(event)">
        <button class="tool-btn primary" onclick="document.getElementById('fileInput').click()">
            📁 Emitir video
        </button>
        <button class="tool-btn" onclick="toggleMute()" id="muteBtn">
            🔊 Audio
        </button>
        <button class="tool-btn" onclick="showInvite()">
            🔗 Invitar
        </button>
        <button class="tool-btn" onclick="toggleFullscreen()">
            ⛶ Pantalla completa
        </button>
    </div>
</div>

<!-- Modal de invitación -->
<div class="modal" id="inviteModal" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2>Compartir Streamnight</h2>
        <p style="color:#888; margin-bottom:20px;">Envía este enlace para que vean en calidad original</p>
        <div class="link-box">
            <input type="text" id="inviteLink" readonly value="Generando...">
            <button class="copy-btn" onclick="copyInviteLink()">Copiar</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex:1; background:#00ffff; color:#000; padding:10px; border-radius:10px; text-align:center;">
                <span>⬆️ 50 Mbps</span>
            </div>
            <div style="flex:1; background:#00b894; color:#000; padding:10px; border-radius:10px; text-align:center;">
                <span>🔄 P2P Directo</span>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        BITRATE: 50000000,
        FPS: 60,
        STUN_SERVERS: [
            'stun:stun.l.google.com:19302',
            'stun:stun1.l.google.com:19302',
            'stun:stun2.l.google.com:19302',
            'stun:stun3.l.google.com:19302'
        ]
    };

    const video = document.getElementById('videoPlayer');
    let peer;
    let connections = [];
    let myStream = null;
    let broadcastActive = false;
    let userName = 'User_' + Math.floor(Math.random() * 1000);
    let audioContext = null;

    function init() {
        peer = new Peer({
            config: {
                iceServers: CONFIG.STUN_SERVERS.map(url => ({ urls: url })),
                iceTransportPolicy: 'all',
                iceCandidatePoolSize: 10
            }
        });

        peer.on('open', id => {
            document.getElementById('peerIdDisplay').innerHTML = `🌙 ${id.substring(0,8)}`;
            const link = `${window.location.origin}${window.location.pathname}#${id}`;
            document.getElementById('inviteLink').value = link;
            
            if(window.location.hash) {
                connectToHost(window.location.hash.substring(1));
            }
            
            startStatsMonitoring();
        });

        peer.on('call', call => {
            if (myStream && broadcastActive) {
                call.answer(myStream, {
                    videoBandwidth: CONFIG.BITRATE,
                    audioBandwidth: 320000
                });
            } else {
                call.answer();
            }
            
            call.on('stream', remoteStream => {
                video.srcObject = remoteStream;
                video.play().catch(e => console.log('Autoplay prevented:', e));
                updateViewerCount('add');
            });
            
            call.on('close', () => {
                updateViewerCount('remove');
            });
        });

        peer.on('connection', conn => {
            connections.push(conn);
            updateViewerCount('add');
            
            conn.on('data', data => {
                if (data.type === 'chat') {
                    addChatMessage(data.user, data.message, false);
                }
            });
            
            conn.on('close', () => {
                connections = connections.filter(c => c.peer !== conn.peer);
                updateViewerCount('remove');
            });
        });

        peer.on('error', err => {
            console.error('Peer error:', err);
        });
    }

    async function captureSystemAudio() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: false,
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 48000
                    }
                });
                
                const audioTrack = displayStream.getAudioTracks()[0];
                if (audioTrack) {
                    return audioTrack;
                }
            }
            return null;
        } catch (e) {
            console.warn('No se pudo capturar audio del sistema:', e);
            return null;
        }
    }

    async function startBroadcasting(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        try {
            video.src = URL.createObjectURL(file);
            await video.play();
            
            let stream;
            if (video.captureStream) {
                stream = video.captureStream(CONFIG.FPS);
            } else if (video.mozCaptureStream) {
                stream = video.mozCaptureStream(CONFIG.FPS);
            } else {
                throw new Error('CaptureStream no soportado');
            }
            
            const systemAudio = await captureSystemAudio();
            if (systemAudio) {
                stream.addTrack(systemAudio);
            }
            
            myStream = stream;
            broadcastActive = true;
            
            connections.forEach(conn => {
                if (conn.open) {
                    const call = peer.call(conn.peer, myStream, {
                        videoBandwidth: CONFIG.BITRATE,
                        audioBandwidth: 320000
                    });
                }
            });
            
            document.querySelector('.quality-badge').innerHTML = '🌙 EMITIENDO · 4K 50 Mbps';
            
        } catch (error) {
            console.error('Error broadcasting:', error);
            alert('Error al emitir: ' + error.message);
        }
    }

    function connectToHost(hostId) {
        const conn = peer.connect(hostId);
        
        conn.on('open', () => {
            connections.push(conn);
            updateViewerCount('add');
            addChatMessage('Sistema', 'Conectado a Streamnight', false);
        });
        
        conn.on('data', data => {
            if (data.type === 'chat') {
                addChatMessage(data.user, data.message, false);
            }
        });
    }

    function toggleChat() {
        const sidebar = document.getElementById('chatSidebar');
        sidebar.classList.toggle('collapsed');
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        
        addChatMessage(userName, message, true);
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    type: 'chat',
                    user: userName,
                    message: message
                });
            }
        });
        
        input.value = '';
    }
    
    function addChatMessage(user, message, isOwn) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : ''}`;
        
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        msgDiv.innerHTML = `
            <div class="message-header">
                <span>${user}</span>
                <span>${time}</span>
            </div>
            <div class="message-bubble">${message}</div>
        `;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function toggleMute() {
        video.muted = !video.muted;
        const btn = document.getElementById('muteBtn');
        btn.innerHTML = video.muted ? '🔇 Audio' : '🔊 Audio';
    }
    
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }
    
    function showInvite() {
        document.getElementById('inviteModal').classList.add('active');
    }
    
    function copyInviteLink() {
        const input = document.getElementById('inviteLink');
        input.select();
        document.execCommand('copy');
        
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copiado';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
    }

    function updateViewerCount(action) {
        const countEl = document.getElementById('viewerCount');
        let count = parseInt(countEl.textContent) || 0;
        
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        
        countEl.textContent = count;
    }

    function startStatsMonitoring() {
        setInterval(() => {
            document.getElementById('bitrateStat').innerHTML = '50 Mbps';
            
            const latency = Math.floor(Math.random() * 20 + 30);
            document.getElementById('latencyStat').innerHTML = latency + 'ms';
            
            if (video.buffered && video.buffered.length > 0) {
                const buffered = video.buffered.end(video.buffered.length - 1);
                const duration = video.duration || 1;
                const percent = Math.min(100, Math.floor((buffered / duration) * 100));
                document.getElementById('bufferStat').innerHTML = percent + '%';
                
                const heat = document.getElementById('heatOverlay');
                heat.style.background = `linear-gradient(90deg, 
                    #00ff00 ${percent-10}%, 
                    #ffff00 ${percent}%, 
                    #ff0000 ${percent+10}%)`;
            }
        }, 1000);
    }

    window.addEventListener('beforeunload', () => {
        if (myStream) {
            myStream.getTracks().forEach(t => t.stop());
        }
        if (audioContext) {
            audioContext.close();
        }
        if (peer) {
            peer.destroy();
        }
    });

    window.onload = init;
</script>
</body>
</html>
