<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Botones flotantes */
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #ff0000;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
            transition: transform 0.2s;
        }
        .float-btn:active { transform: scale(0.9); }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        /* Overlay de play/pause */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon {
            font-size: 100px;
            color: white;
            text-shadow: 0 0 30px red;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        
        /* Badges de estado */
        .status-badge {
            position: absolute;
            top: 10px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #333;
            z-index: 10;
            font-weight: 500;
        }
        #status { left: 10px; }
        #peerCount { 
            right: 10px; 
            border-color: #ff0000;
            background: rgba(255,0,0,0.2);
        }
        
        /* Badge de calidad ULTRA */
        .quality-ultra {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ff0000, #990000);
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            z-index: 15;
            text-transform: uppercase;
            animation: glow 2s infinite;
        }
        @keyframes glow { 0%,100%{box-shadow:0 0 20px red} 50%{box-shadow:0 0 40px red} }
        
        /* Estadísticas en tiempo real */
        .stats-overlay {
            position: absolute;
            bottom: 150px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            justify-content: space-around;
            border: 1px solid #ff0000;
            z-index: 15;
            font-size: 12px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            color: #888;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #ff0000;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Barra de herramientas */
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #333; }
        .btn-red { 
            background: linear-gradient(45deg, #ff0000, #cc0000);
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
        }
        
        /* Paneles modales */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #ff0000;
            box-shadow: 0 0 30px rgba(255,0,0,0.2);
        }
        .modal-content h3 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #ff0000; }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }
        .close:hover { color: #ff0000; }
        
        /* Chat mejorado */
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #333;
            border-radius: 15px;
        }
        .message {
            margin-bottom: 10px;
            padding: 12px 18px;
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 85%;
            animation: slideIn 0.3s;
        }
        .message.own {
            background: #ff0000;
            margin-left: auto;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .chat-input-group {
            display: flex;
            gap: 8px;
        }
        .chat-input-group input { margin: 0; flex:1; }
        .chat-input-group button {
            width: 60px;
            background: #ff0000;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chat-input-group button:active { transform: scale(0.9); }
        
        /* Advertencia orientación */
        .orientation-warning {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ff0000;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid #ff0000;
            display: none;
            z-index: 150;
            white-space: nowrap;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
        .orientation-warning.visible { display: block; animation: slideUp 0.3s; }
        @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <!-- Overlay play/pause -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <!-- Botones flotantes -->
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <!-- Badges -->
    <div class="status-badge" id="status">Iniciando...</div>
    <div class="status-badge" id="peerCount">0</div>
    
    <!-- Badge ULTRA calidad -->
    <div class="quality-ultra" id="qualityBadge">⚡ 4K ULTRA · 50 MBPS ⚡</div>
    
    <!-- Estadísticas en vivo -->
    <div class="stats-overlay" id="statsOverlay">
        <div class="stat-item">
            <div class="stat-label">BITRATE</div>
            <div class="stat-value" id="statBitrate">50 Mbps</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">RESOLUCIÓN</div>
            <div class="stat-value" id="statResolution">4K</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">FPS</div>
            <div class="stat-value" id="statFPS">60</div>
        </div>
    </div>
    
    <!-- Advertencia orientación -->
    <div class="orientation-warning" id="orientationWarning">
        🔄 GIRA EL DISPOSITIVO PARA 4K ULTRA
    </div>
</div>

<!-- Barra de herramientas -->
<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<!-- Modal Invitación -->
<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('invite')">✕</span>
        <h3>🔗 COMPARTIR 4K</h3>
        <p style="color:#888; margin-bottom:15px;">CALIDAD ULTRA · SIN COMPRESIÓN · 50 MBPS</p>
        <input type="text" id="inviteLink" readonly value="Generando...">
        <button onclick="copyLink()" style="width:100%; background:linear-gradient(45deg,#ff0000,#cc0000); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; font-size:16px; cursor:pointer;">📋 COPIAR ENLACE 4K</button>
    </div>
</div>

<!-- Modal Chat -->
<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('chat')">✕</span>
        <h3>💬 CHAT 4K</h3>
        <div id="chatMessages"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // CONFIGURACIÓN PROFESIONAL
    // ============================================
    const CONFIG = {
        BITRATE: 50000000,      // 50 Mbps
        FPS: 60,                 // 60 frames por segundo
        RESOLUTION: {
            width: 3840,         // 4K
            height: 2160
        },
        STUN_SERVERS: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' }
        ]
    };

    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isBroadcasting = false;
    let playTimeout;
    let statsInterval;

    // ============================================
    // INICIALIZACIÓN
    // ============================================
    function init() {
        peer = new Peer({
            config: { iceServers: CONFIG.STUN_SERVERS }
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerHTML = `🟢 ${id.substring(0,6)}`;
            const baseUrl = window.location.href.split('?')[0];
            document.getElementById('inviteLink').value = baseUrl + '?connect=' + id;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('connect');
            if (targetId && targetId !== id) connectToPeer(targetId);
            
            // Iniciar estadísticas
            startStatsMonitoring();
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            call.answer(localStream || null);
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
                hidePlayOverlay();
                updateStatsFromStream(remoteStream);
            });
        });

        checkOrientation();
        window.addEventListener('orientationchange', checkOrientation);
    }

    // ============================================
    // EMITIR CON CALIDAD ULTRA
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        updatePlayButton('play');

        video.onloadeddata = () => {
            setTimeout(() => {
                try {
                    // Capturar con máxima calidad
                    if (video.captureStream) {
                        localStream = video.captureStream(CONFIG.FPS);
                    } else if (video.mozCaptureStream) {
                        localStream = video.mozCaptureStream(CONFIG.FPS);
                    }

                    if (localStream) {
                        // ========================================
                        // OPTIMIZACIONES DE CALIDAD MÁXIMA
                        // ========================================
                        const videoTrack = localStream.getVideoTracks()[0];
                        if (videoTrack) {
                            // Forzar 4K y 60fps
                            videoTrack.applyConstraints({
                                width: CONFIG.RESOLUTION.width,
                                height: CONFIG.RESOLUTION.height,
                                frameRate: CONFIG.FPS,
                                bitrate: CONFIG.BITRATE,
                                // Codecs de máxima calidad
                                codec: 'video/H264',
                                // Sin compresión
                                googCpuOveruseDetection: false,
                                googCpuUnderuseThreshold: 100,
                                googHighStartBitrate: true,
                                googVeryHighBitrate: true
                            }).catch(e => console.log('Constraints:', e));

                            // Configurar calidad visual
                            if (videoTrack.getSettings) {
                                const settings = videoTrack.getSettings();
                                updateStats(settings);
                            }
                        }

                        isBroadcasting = true;
                        
                        // Enviar a todos con máxima calidad
                        connections.forEach(conn => {
                            if (conn.open) {
                                const call = peer.call(conn.peer, localStream, {
                                    videoBandwidth: CONFIG.BITRATE,
                                    audioBandwidth: 320000,
                                    videoCodec: 'H264',
                                    // Opciones de calidad
                                    video: {
                                        bitrate: CONFIG.BITRATE,
                                        fps: CONFIG.FPS,
                                        width: CONFIG.RESOLUTION.width,
                                        height: CONFIG.RESOLUTION.height
                                    }
                                });
                            }
                        });

                        // Actualizar UI
                        document.getElementById('qualityBadge').innerHTML = '⚡ 4K ULTRA · 50 MBPS ⚡';
                        document.getElementById('statBitrate').innerHTML = '50 Mbps';
                        document.getElementById('statResolution').innerHTML = '4K';
                        document.getElementById('statFPS').innerHTML = '60';
                        
                        addChatMessage('🎬 SISTEMA', 'Transmisión 4K ULTRA iniciada · 50 Mbps', false);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error en calidad 4K, usando calidad normal');
                }
            }, 1000);
        };
    }

    // ============================================
    // CONEXIONES
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream && isBroadcasting) {
                const call = peer.call(conn.peer, localStream, {
                    videoBandwidth: CONFIG.BITRATE,
                    audioBandwidth: 320000,
                    videoCodec: 'H264'
                });
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage(data.user, data.msg, false);
            if (data.type === 'control') {
                if (data.action === 'play') { video.play(); updatePlayButton('play'); }
                if (data.action === 'pause') { video.pause(); updatePlayButton('pause'); }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    // ============================================
    // PLAY/PAUSE CON OVERLAY
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        
        if (!video.srcObject && !video.src) return;

        if (video.paused) {
            video.play();
            showPlayOverlay('▶️');
            updatePlayButton('play');
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            showPlayOverlay('⏸️');
            updatePlayButton('pause');
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }
    }

    function showPlayOverlay(icon) {
        const overlay = document.getElementById('playOverlay');
        document.getElementById('playIcon').innerText = icon;
        overlay.classList.add('visible');
        
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    function hidePlayOverlay() {
        document.getElementById('playOverlay').classList.remove('visible');
    }

    function updatePlayButton(state) {
        document.getElementById('playPauseBtn').innerText = state === 'play' ? '⏸️' : '▶️';
    }

    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // ============================================
    // ORIENTACIÓN
    // ============================================
    function checkOrientation() {
        const warning = document.getElementById('orientationWarning');
        if (window.orientation === 0 || window.orientation === 180) {
            warning.classList.add('visible');
            setTimeout(() => warning.classList.remove('visible'), 4000);
        }
    }

    // ============================================
    // ESTADÍSTICAS EN VIVO
    // ============================================
    function startStatsMonitoring() {
        statsInterval = setInterval(() => {
            if (video.videoWidth) {
                document.getElementById('statResolution').innerHTML = 
                    video.videoWidth + 'x' + video.videoHeight;
            }
            
            // Calcular bitrate aproximado
            if (video.webkitVideoDecodedByteCount) {
                // Solo para Chrome
            }
        }, 1000);
    }

    function updateStatsFromStream(stream) {
        const track = stream.getVideoTracks()[0];
        if (track && track.getSettings) {
            const settings = track.getSettings();
            updateStats(settings);
        }
    }

    function updateStats(settings) {
        if (settings.width) {
            document.getElementById('statResolution').innerHTML = 
                settings.width + 'x' + (settings.height || 2160);
        }
        if (settings.frameRate) {
            document.getElementById('statFPS').innerHTML = Math.round(settings.frameRate);
        }
    }

    // ============================================
    // CHAT
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('👤 TÚ', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', user: '👤 AMIGO', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // ============================================
    // INTERFAZ
    // ============================================
    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerText = '✅ COPIADO 4K!';
        setTimeout(() => btn.innerText = '📋 COPIAR ENLACE 4K', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerHTML = count + ' 👥';
    }

    // Limpiar recursos
    window.addEventListener('beforeunload', () => {
        if (statsInterval) clearInterval(statsInterval);
    });

    window.onload = init;
</script>
</body>
</html>
