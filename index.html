<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K Máxima Calidad</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* [Mantén el mismo CSS de antes] */
    </style>
</head>
<body>
    <!-- [Mismo HTML de antes] -->
</body>
<script>
    // ============================================
    // CONFIGURACIÓN DE CALIDAD MÁXIMA
    // Basado en investigación técnica
    // ============================================
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let playTimeout;

    function init() {
        // Configurar PeerJS con opciones de calidad
        peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ],
                // Priorizar calidad sobre latencia
                sdpSemantics: 'unified-plan'
            }
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerText = 'ID: ' + id.substring(0,6);
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            if (localStream) {
                // Responder con configuración de alta calidad
                call.answer(localStream, {
                    videoBandwidth: 50000000, // 50Mbps forzado [citation:6]
                    audioBandwidth: 512000,    // 512kbps para audio
                    videoCodec: 'H264',        // o 'VP9' si el navegador lo soporta
                    video: {
                        bitrate: 50000000,
                        maxBitrate: 50000000,
                        minBitrate: 50000000
                    }
                });
            } else {
                call.answer();
            }
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
    }

    // ============================================
    // EMITIR CON MÁXIMA CALIDAD
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        document.getElementById('playPauseBtn').innerText = '⏸️';

        video.onloadeddata = () => {
            setTimeout(() => {
                // Capturar stream con la resolución original
                if (video.captureStream) {
                    localStream = video.captureStream(60);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(60);
                }

                if (localStream) {
                    // ========================================
                    // APLICAR CONFIGURACIÓN DE CALIDAD MÁXIMA
                    // ========================================
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        // 1. Forzar resolución exacta del video original
                        const constraints = {
                            width: { exact: video.videoWidth },
                            height: { exact: video.videoHeight },
                            frameRate: { exact: 60 }
                        };
                        
                        try {
                            videoTrack.applyConstraints(constraints);
                            console.log(`✅ Resolución forzada: ${video.videoWidth}x${video.videoHeight}`);
                        } catch (e) {
                            console.warn('No se pudo forzar resolución exacta');
                        }
                        
                        // 2. Desactivar procesamiento que afecta calidad [citation:1][citation:5]
                        if (videoTrack.getSettings) {
                            console.log('Calidad original:', videoTrack.getSettings());
                        }
                        
                        // 3. En Chrome, podemos forzar bitrate con estos parámetros [citation:10]
                        if (videoTrack.bitrate) {
                            // Solo disponible en algunas implementaciones
                        }
                    }

                    // 4. Configurar audio sin procesamiento [citation:1]
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        try {
                            audioTrack.applyConstraints({
                                autoGainControl: false,
                                echoCancellation: false,
                                noiseSuppression: false
                            });
                            console.log('✅ Audio sin procesamiento');
                        } catch (e) {
                            console.warn('No se pudo desactivar procesamiento de audio');
                        }
                    }

                    // 5. Notificar calidad a todos los peers
                    connections.forEach(conn => {
                        if (conn.open) {
                            // Llamar con opciones de alta calidad
                            const call = peer.call(conn.peer, localStream, {
                                videoBandwidth: 50000000,
                                audioBandwidth: 512000,
                                videoCodec: 'H264'
                            });
                            
                            call.on('error', (err) => {
                                console.warn('Error en llamada:', err);
                                // Si falla H264, intentar con VP8
                                if (err.message.includes('codec')) {
                                    const fallbackCall = peer.call(conn.peer, localStream, {
                                        videoCodec: 'VP8'
                                    });
                                }
                            });
                        }
                    });
                    
                    addChatMessage('🎬 4K', '⚡ CALIDAD MÁXIMA ACTIVADA ⚡', false);
                }
            }, 500);
        };
    }

    // ============================================
    // RESTO DE FUNCIONES (igual que antes)
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream) {
                peer.call(conn.peer, localStream, {
                    videoBandwidth: 50000000,
                    audioBandwidth: 512000,
                    videoCodec: 'H264'
                });
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage('Amigo', data.msg, false);
            } else if (data.type === 'control') {
                if (data.action === 'play') {
                    video.play();
                    document.getElementById('playPauseBtn').innerText = '⏸️';
                }
                if (data.action === 'pause') {
                    video.pause();
                    document.getElementById('playPauseBtn').innerText = '▶️';
                }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    // ============================================
    // FUNCIONES DE CONTROL
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerText = '✅ COPIADO';
        setTimeout(() => btn.innerText = '📋 COPIAR ENLACE', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count;
    }

    window.onload = init;
</script>
</body>
</html>
