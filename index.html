<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K Sin Pérdida</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Botones flotantes */
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #ff0000;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
            transition: transform 0.2s;
        }
        .float-btn:active { transform: scale(0.9); }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        /* Overlay de play/pause (5 segundos) */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon {
            font-size: 100px;
            color: white;
            text-shadow: 0 0 30px red;
        }
        
        /* Badges de estado */
        .status-badge {
            position: absolute;
            top: 10px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #333;
            z-index: 10;
        }
        #status { left: 10px; }
        #peerCount { 
            right: 10px; 
            border-color: red;
        }
        .badge {
            background: red;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 5px;
        }
        .quality-badge {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #00ff00;
            z-index: 15;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* Barra de herramientas */
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:active { background: #333; }
        .btn-red { 
            background: red;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }
        
        /* Paneles modales */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .modal-content h3 {
            color: red;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 14px;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }
        .close:hover { color: red; }
        
        /* Chat */
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #333;
            border-radius: 12px;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px 15px;
            background: #1a1a1a;
            border-radius: 18px;
            max-width: 85%;
        }
        .message.own {
            background: red;
            margin-left: auto;
        }
        .chat-input-group {
            display: flex;
            gap: 8px;
        }
        .chat-input-group input { margin: 0; }
        .chat-input-group button {
            width: 60px;
            background: red;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Advertencia orientación */
        .orientation-warning {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: red;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid red;
            display: none;
            z-index: 150;
            white-space: nowrap;
        }
        .orientation-warning.visible { display: block; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <!-- Overlay play/pause (5s) -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <!-- Botones flotantes -->
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <!-- Badges -->
    <div class="status-badge" id="status">Iniciando...</div>
    <div class="status-badge" id="peerCount">0 <span class="badge">50 Mbps</span></div>
    
    <!-- Badge de calidad -->
    <div class="quality-badge" id="qualityBadge">⚡ 4K SIN PÉRDIDA ⚡</div>
    
    <!-- Advertencia orientación -->
    <div class="orientation-warning" id="orientationWarning">
        🔄 Gira el dispositivo para mejor experiencia
    </div>
</div>

<!-- Barra de herramientas -->
<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<!-- Modal Invitación -->
<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('invite')">✕</span>
        <h3>🔗 Compartir Stream</h3>
        <p style="color:#888; margin-bottom:15px;">CALIDAD ORIGINAL · SIN COMPRESIÓN</p>
        <input type="text" id="inviteLink" readonly value="Generando...">
        <button onclick="copyLink()" style="width:100%; background:red; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">📋 COPIAR ENLACE</button>
    </div>
</div>

<!-- Modal Chat -->
<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('chat')">✕</span>
        <h3>💬 Chat en vivo</h3>
        <div id="chatMessages"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    // Configuración
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isBroadcasting = false;
    let playTimeout;

    // ============================================
    // INICIALIZACIÓN
    // ============================================
    function init() {
        peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerHTML = `🟢 ${id.substring(0,6)}`;
            const baseUrl = window.location.href.split('?')[0];
            document.getElementById('inviteLink').value = baseUrl + '?connect=' + id;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('connect');
            if (targetId && targetId !== id) connectToPeer(targetId);
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            call.answer(localStream || null);
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
                hidePlayOverlay();
            });
        });

        checkOrientation();
        window.addEventListener('orientationchange', checkOrientation);
    }

    // ============================================
    // EMITIR VIDEO - CON MÁXIMA CALIDAD
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        updatePlayButton('play');

        video.onloadeddata = () => {
            setTimeout(() => {
                // CAPTURAR CON LA MÁXIMA CALIDAD POSIBLE
                if (video.captureStream) {
                    // Forzar 60fps y resolución original
                    localStream = video.captureStream(60);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(60);
                }

                if (localStream) {
                    isBroadcasting = true;
                    
                    // ========================================
                    // FORZAR MÁXIMA CALIDAD EN EL STREAM
                    // ========================================
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        // Obtener dimensiones originales
                        const settings = videoTrack.getSettings();
                        console.log('Calidad original:', settings);
                        
                        // Aplicar constraints para MÁXIMA calidad
                        videoTrack.applyConstraints({
                            width: { ideal: 3840 },  // 4K
                            height: { ideal: 2160 },
                            frameRate: { ideal: 60 },
                            bitrate: 50000000  // 50 Mbps
                        }).catch(e => console.log('Constraints no aplicables:', e));
                    }

                    // Enviar a todos los conectados
                    connections.forEach(conn => {
                        if (conn.open) {
                            const call = peer.call(conn.peer, localStream);
                            
                            // Configurar la llamada para máxima calidad
                            call.answer(localStream, {
                                videoBandwidth: 50000000,  // 50 Mbps
                                audioBandwidth: 320000,     // 320 kbps
                                videoCodec: 'H264'          // Mejor codec
                            });
                        }
                    });

                    document.getElementById('qualityBadge').innerHTML = '⚡ 4K 50Mbps SIN PÉRDIDA ⚡';
                    addChatMessage('Sistema', '📡 Transmisión 4K · 50 Mbps', false);
                }
            }, 500);
        };
    }

    // ============================================
    // CONEXIONES
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream && isBroadcasting) {
                const call = peer.call(conn.peer, localStream, {
                    videoBandwidth: 50000000,
                    audioBandwidth: 320000,
                    videoCodec: 'H264'
                });
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
            if (data.type === 'control') {
                if (data.action === 'play') { video.play(); updatePlayButton('play'); }
                if (data.action === 'pause') { video.pause(); updatePlayButton('pause'); }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    // ============================================
    // PLAY/PAUSE CON OVERLAY (5 SEGUNDOS)
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        
        if (!video.srcObject && !video.src) return;

        if (video.paused) {
            video.play();
            showPlayOverlay('▶️');
            updatePlayButton('play');
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            showPlayOverlay('⏸️');
            updatePlayButton('pause');
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }
    }

    function showPlayOverlay(icon) {
        const overlay = document.getElementById('playOverlay');
        document.getElementById('playIcon').innerText = icon;
        overlay.classList.add('visible');
        
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    function hidePlayOverlay() {
        document.getElementById('playOverlay').classList.remove('visible');
    }

    function updatePlayButton(state) {
        document.getElementById('playPauseBtn').innerText = state === 'play' ? '⏸️' : '▶️';
    }

    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // ============================================
    // ORIENTACIÓN
    // ============================================
    function checkOrientation() {
        const warning = document.getElementById('orientationWarning');
        if (window.orientation === 0 || window.orientation === 180) {
            warning.classList.add('visible');
            setTimeout(() => warning.classList.remove('visible'), 3000);
        }
    }

    // ============================================
    // CHAT
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // ============================================
    // INTERFAZ
    // ============================================
    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerText = '✅ COPIADO!';
        setTimeout(() => btn.innerText = '📋 COPIAR ENLACE', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerHTML = count + ' <span class="badge">50 Mbps</span>';
    }

    window.onload = init;
</script>
</body>
</html>
