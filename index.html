<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Simple</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            max-height: 100%;
            background: #000;
        }
        #playPauseBtn {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: red;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            font-size: 30px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #fullscreenBtn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: red;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            font-size: 30px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .controls {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        button {
            flex: 1;
            padding: 15px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-red {
            background: red;
        }
        .panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            padding: 20px;
            z-index: 200;
        }
        .panel.active { display: block; }
        .panel-content {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 50px auto;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
        .status {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 100;
        }
        .peer-count {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 100;
        }
        .badge {
            background: red;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" playsinline></video>
    
    <!-- BOTONES VISIBLES -->
    <button id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="status" id="status">Iniciando...</div>
    <div class="peer-count" id="peerCount">0 <span class="badge">50 Mbps</span></div>
</div>

<div class="controls">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn-red" onclick="document.getElementById('fileInput').click()">📹 Emitir</button>
    <button onclick="showInvite()">🔗 Invitar</button>
    <button onclick="showChat()">💬 Chat</button>
</div>

<!-- Panel invitación -->
<div id="invitePanel" class="panel" onclick="hidePanel('invitePanel')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">Compartir</h3>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:red;">Copiar</button>
        <button onclick="hidePanel('invitePanel')" style="width:100%; margin-top:10px;">Cerrar</button>
    </div>
</div>

<!-- Panel chat -->
<div id="chatPanel" class="panel" onclick="hidePanel('chatPanel')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">Chat</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1;">
            <button onclick="sendMessage()" style="background:red;">➤</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isPlaying = false;

    function init() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            document.getElementById('status').innerText = 'ID: ' + id.substring(0,6);
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });
        
        peer.on('connection', (conn) => setupConnection(conn));
        
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
    }

    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        
        video.src = URL.createObjectURL(file);
        video.play();
        isPlaying = true;
        document.getElementById('playPauseBtn').innerText = '⏸️';
        
        video.onloadeddata = () => {
            setTimeout(() => {
                localStream = video.captureStream ? video.captureStream(30) : video.mozCaptureStream(30);
                
                connections.forEach(conn => {
                    if (conn.open) {
                        peer.call(conn.peer, localStream);
                    }
                });
            }, 500);
        };
    }

    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');
        
        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage(data.user, data.msg, false);
            } else if (data.type === 'playpause') {
                if (data.playing) {
                    video.play();
                    document.getElementById('playPauseBtn').innerText = '⏸️';
                } else {
                    video.pause();
                    document.getElementById('playPauseBtn').innerText = '▶️';
                }
            }
        });
        
        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
        
        if (localStream) {
            peer.call(conn.peer, localStream);
        }
    }

    // FUNCIONES DE BOTONES
    function togglePlay(event) {
        event.stopPropagation();
        if (!video.srcObject && !video.src) return;
        
        if (video.paused) {
            video.play();
            document.getElementById('playPauseBtn').innerText = '⏸️';
            connections.forEach(conn => {
                if (conn.open) conn.send({type: 'playpause', playing: true});
            });
        } else {
            video.pause();
            document.getElementById('playPauseBtn').innerText = '▶️';
            connections.forEach(conn => {
                if (conn.open) conn.send({type: 'playpause', playing: false});
            });
        }
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // CHAT
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        
        addChatMessage('Tú', msg, true);
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({type: 'chat', user: 'Amigo', msg: msg});
            }
        });
        
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // INTERFAZ
    function showInvite() { document.getElementById('invitePanel').classList.add('active'); }
    function showChat() { document.getElementById('chatPanel').classList.add('active'); }
    function hidePanel(id) { document.getElementById(id).classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        alert('¡Copiado!');
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove') count--;
        el.innerHTML = count + ' <span class="badge">50 Mbps</span>';
    }

    window.onload = init;
</script>
</body>
</html>
