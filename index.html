<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamnight · P2P Directo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #111;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #00ffff;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .peer-id {
            background: #222;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #00ffff;
            color: #00ffff;
        }

        .btn-icon {
            background: #222;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Video container */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay de play/pause */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 10;
        }

        .play-overlay.visible {
            opacity: 1;
        }

        .play-icon {
            font-size: 80px;
            color: #00ffff;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Badge de calidad */
        .quality-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #00ffff;
            color: #000;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            z-index: 5;
        }

        /* Chat */
        .chat-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 300px;
            background: #111;
            border-left: 2px solid #00ffff;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 20;
        }

        .chat-sidebar.active {
            transform: translateX(0);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: #00ffff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 90%;
        }

        .message.own {
            margin-left: auto;
        }

        .message-bubble {
            background: #222;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 13px;
            word-break: break-word;
        }

        .message.own .message-bubble {
            background: #00ffff;
            color: #000;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ffff;
        }

        .chat-send {
            width: 45px;
            height: 45px;
            border-radius: 45px;
            background: #00ffff;
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
        }

        /* Toolbar */
        .toolbar {
            background: #111;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #00ffff;
        }

        .tool-btn {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .tool-btn.primary {
            background: #00ffff;
            color: #000;
            border: none;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #00ffff;
        }

        .link-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .link-box input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: white;
        }

        .copy-btn {
            background: #00ffff;
            border: none;
            color: #000;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #00ffff;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">🌙 Streamnight</div>
        <div style="display: flex; align-items: center;">
            <span class="peer-id" id="peerIdDisplay">Conectando...</span>
            <button class="btn-icon" onclick="toggleChat()">💬</button>
        </div>
    </div>

    <!-- Video container -->
    <div class="video-container" onclick="togglePlay()">
        <video id="videoPlayer" playsinline webkit-playsinline></video>
        
        <!-- Play/Pause overlay -->
        <div class="play-overlay" id="playOverlay">
            <div class="play-icon" id="playIcon">▶️</div>
        </div>
        
        <!-- Quality badge -->
        <div class="quality-badge" id="qualityBadge">
            🌙 50 Mbps
        </div>
        
        <!-- Status -->
        <div class="status-indicator" id="statusIndicator">
            👥 0 espectadores
        </div>
    </div>

    <!-- Chat sidebar -->
    <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-header">
            <h3>Chat</h3>
            <button class="btn-icon" onclick="toggleChat()" style="width:30px;height:30px;">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="file" id="fileInput" hidden accept="video/*" onchange="handleFileSelect(event)">
        <button class="tool-btn primary" onclick="document.getElementById('fileInput').click()">
            📁 Emitir
        </button>
        <button class="tool-btn" onclick="toggleMute()" id="muteBtn">
            🔊 Audio
        </button>
        <button class="tool-btn" onclick="showInvite()">
            🔗 Invitar
        </button>
        <button class="tool-btn" onclick="toggleFullscreen()">
            ⛶ Pantalla completa
        </button>
    </div>
</div>

<!-- Modal invitación -->
<div class="modal" id="inviteModal" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:#00ffff;">Compartir Stream</h2>
        <p style="color:#888;">Envía este enlace a tus amigos:</p>
        <div class="link-box">
            <input type="text" id="inviteLink" readonly value="Generando...">
            <button class="copy-btn" onclick="copyInviteLink()">Copiar</button>
        </div>
        <p style="color:#888; font-size:12px; margin-top:15px;">
            🔗 El enlace contiene tu ID único
        </p>
    </div>
</div>

<script>
    // ============================================
    // CONFIGURACIÓN
    // ============================================
    const CONFIG = {
        STUN_SERVERS: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    // Elementos DOM
    const video = document.getElementById('videoPlayer');
    let peerConnection;
    let dataChannel;
    let localStream = null;
    let remoteStream = null;
    let isBroadcasting = false;
    let viewers = new Set();
    let userName = 'User_' + Math.floor(Math.random() * 1000);
    let playTimeout;

    // ============================================
    // INICIALIZACIÓN - CREAR PEER CONNECTION
    // ============================================
    async function init() {
        console.log('🚀 Iniciando Streamnight...');
        
        // Generar ID único para este peer
        const peerId = generatePeerId();
        document.getElementById('peerIdDisplay').innerHTML = `🌙 ${peerId}`;
        
        // Guardar ID en URL para compartir
        const inviteLink = `${window.location.origin}${window.location.pathname}?id=${peerId}`;
        document.getElementById('inviteLink').value = inviteLink;
        
        // Verificar si venimos de un enlace con ID
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        
        if (targetId && targetId !== peerId) {
            console.log('🔗 Conectando a:', targetId);
            connectToPeer(targetId);
        }
        
        // Configurar detección de orientación
        setupOrientation();
    }

    // Generar ID aleatorio
    function generatePeerId() {
        return Math.random().toString(36).substring(2, 8) + 
               Math.random().toString(36).substring(2, 8);
    }

    // ============================================
    // FUNCIÓN PRINCIPAL: EMITIR VIDEO
    // ============================================
    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
            // Crear URL del video
            const videoUrl = URL.createObjectURL(file);
            video.src = videoUrl;
            
            // Esperar que cargue el video
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
            });
            
            // Reproducir localmente
            await video.play();
            console.log('✅ Video local reproduciendo');
            
            // CAPTURAR EL STREAM DEL VIDEO
            if (video.captureStream) {
                localStream = video.captureStream(30); // 30 fps
            } else if (video.mozCaptureStream) {
                localStream = video.mozCaptureStream(30);
            } else {
                alert('Tu navegador no soporta captureStream');
                return;
            }
            
            isBroadcasting = true;
            document.getElementById('qualityBadge').innerHTML = '🔴 EMITIENDO · 4K';
            
            // Si ya hay viewers conectados, enviar stream
            if (peerConnection && peerConnection.connectionState === 'connected') {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
        } catch (error) {
            console.error('Error:', error);
            alert('Error al cargar el video');
        }
    }

    // ============================================
    // CONECTAR A OTRO PEER (VISOR)
    // ============================================
    async function connectToPeer(targetId) {
        console.log('🔌 Conectando a peer:', targetId);
        
        // Crear nueva conexión peer
        peerConnection = new RTCPeerConnection({
            iceServers: CONFIG.STUN_SERVERS
        });

        // Crear canal de datos para chat
        dataChannel = peerConnection.createDataChannel('chat');
        setupDataChannel();

        // Manejar tracks entrantes
        peerConnection.ontrack = (event) => {
            console.log('📺 Recibiendo stream');
            
            if (!remoteStream) {
                remoteStream = new MediaStream();
                video.srcObject = remoteStream;
            }
            
            event.streams[0].getTracks().forEach(track => {
                remoteStream.addTrack(track);
            });
            
            // Intentar reproducir
            video.play()
                .then(() => console.log('▶️ Reproduciendo'))
                .catch(e => console.log('Autoplay bloqueado:', e));
            
            updateViewerCount('add');
        };

        // Manejar candidatos ICE
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                console.log('📡 ICE candidate generado');
                // En una implementación real, enviaríamos esto al otro peer
                // Por ahora usamos señalización manual
            }
        };

        peerConnection.onconnectionstatechange = () => {
            console.log('🔌 Estado:', peerConnection.connectionState);
            if (peerConnection.connectionState === 'connected') {
                console.log('✅ Conectado!');
            }
        };

        // Crear oferta
        try {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Aquí necesitaríamos enviar la oferta al otro peer
            // Por simplicidad, usaremos prompt para señalización manual
            const offerString = JSON.stringify(peerConnection.localDescription);
            console.log('📤 OFERTA:', offerString);
            
            // En un sistema real, esto se enviaría por un servidor de señalización
            // Por ahora, el otro peer debe ingresar esta oferta manualmente
            prompt('Copia esta oferta y envíala al otro peer:', offerString);
            
        } catch (error) {
            console.error('Error creating offer:', error);
        }
    }

    // ============================================
    // CHAT
    // ============================================
    function setupDataChannel() {
        if (!dataChannel) return;
        
        dataChannel.onopen = () => {
            console.log('💬 Canal de chat abierto');
        };
        
        dataChannel.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'chat') {
                addChatMessage(data.user, data.message, false);
            }
        };
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        
        addChatMessage(userName, message, true);
        
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({
                type: 'chat',
                user: userName,
                message: message
            }));
        }
        
        input.value = '';
    }

    function addChatMessage(user, message, isOwn) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : ''}`;
        msgDiv.innerHTML = `<div class="message-bubble"><strong>${user}:</strong> ${message}</div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    // ============================================
    // PLAY/PAUSE OVERLAY (5 segundos)
    // ============================================
    function togglePlay() {
        if (!video.srcObject && !video.src) return;
        
        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');
        
        if (video.paused) {
            video.play();
            icon.textContent = '▶️';
        } else {
            video.pause();
            icon.textContent = '⏸️';
        }
        
        overlay.classList.add('visible');
        
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    // ============================================
    // ORIENTACIÓN
    // ============================================
    function setupOrientation() {
        window.addEventListener('orientationchange', () => {
            if (window.orientation === 0 || window.orientation === 180) {
                // Modo vertical - mostrar advertencia
                alert('🌙 Gira el dispositivo para mejor experiencia');
            }
        });
    }

    // ============================================
    // FUNCIONES DE INTERFAZ
    // ============================================
    function toggleChat() {
        document.getElementById('chatSidebar').classList.toggle('active');
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('muteBtn').innerHTML = video.muted ? '🔇 Audio' : '🔊 Audio';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }

    function showInvite() {
        document.getElementById('inviteModal').classList.add('active');
    }

    function copyInviteLink() {
        const input = document.getElementById('inviteLink');
        input.select();
        document.execCommand('copy');
        
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copiado';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
    }

    function updateViewerCount(action) {
        if (action === 'add') viewers.add('viewer');
        if (action === 'remove') viewers.clear();
        
        document.getElementById('statusIndicator').innerHTML = `👥 ${viewers.size} espectadores`;
    }

    // Iniciar
    window.onload = init;
</script>
</body>
</html>
