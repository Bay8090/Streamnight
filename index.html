<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K Directo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: red;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 100px; color: white; }
        
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid red;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; }
        
        .quality-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            white-space: nowrap;
        }
        
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: red; }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid red;
        }
        .modal-content h3 { color: red; margin-bottom: 15px; }
        
        .code-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .action-btn {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            background: red;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .secondary-btn {
            background: #333;
        }
        
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <div class="quality-badge" id="qualityBadge">⚡ 4K SIN COMPRESIÓN ⚡</div>
</div>

<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR</button>
    <button class="btn" onclick="showConnectModal()">🔗 CONECTAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<!-- Modal de conexión WebRTC (SIMPLIFICADO) -->
<div id="connectModal" class="modal" onclick="hideModal('connect')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('connect')" style="float:right; color:#888; font-size:24px; cursor:pointer;">✕</span>
        <h3>🔗 CONEXIÓN 4K</h3>
        
        <div id="step1">
            <p style="color:#888; margin-bottom:10px;">1. Genera el código de invitación:</p>
            <button class="action-btn" onclick="generateOffer()">🎬 GENERAR CÓDIGO</button>
        </div>
        
        <div id="step2" style="display:none;">
            <p style="color:#888; margin-bottom:10px;">2. Copia este código y envíalo a tu amigo:</p>
            <div class="code-box" id="offerCode"></div>
            <button class="action-btn" onclick="copyOffer()">📋 COPIAR CÓDIGO</button>
            <button class="action-btn secondary-btn" onclick="showPasteStep()">YA LO ENVIÉ, SIGUIENTE</button>
        </div>
        
        <div id="step3" style="display:none;">
            <p style="color:#888; margin-bottom:10px;">3. Pega el código que te envió tu amigo:</p>
            <div class="code-box">
                <input type="text" id="pasteCode" placeholder="Pega aquí el código..." style="width:100%; background:#000; color:#0f0; border:none; outline:none;">
            </div>
            <button class="action-btn" onclick="processCode()">🔗 CONECTAR</button>
        </div>
        
        <div id="step4" style="display:none;">
            <p style="color:#0f0; text-align:center;">✅ ¡CONECTADO!</p>
            <p style="color:#888; text-align:center;">Calidad 4K sin compresión</p>
            <button class="action-btn" onclick="hideModal('connect')">CERRAR</button>
        </div>
    </div>
</div>

<!-- Modal Chat -->
<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('chat')" style="float:right; color:#888; font-size:24px; cursor:pointer;">✕</span>
        <h3>💬 CHAT</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1; padding:10px; background:#000; color:white; border:1px solid #333;">
            <button onclick="sendMessage()" style="background:red; color:white; border:none; width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // WEBRTC SIMPLIFICADO
    // ============================================
    const video = document.getElementById('video');
    let peerConnection;
    let dataChannel;
    let localStream = null;
    let playTimeout;

    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
        ]
    };

    // ============================================
    // EMITIR VIDEO
    // ============================================
    async function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        video.src = URL.createObjectURL(file);
        await video.play();
        document.getElementById('playPauseBtn').innerText = '⏸️';

        await new Promise(resolve => video.onloadedmetadata = resolve);

        if (video.captureStream) {
            localStream = video.captureStream(60);
        } else if (video.mozCaptureStream) {
            localStream = video.mozCaptureStream(60);
        }

        if (localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                try {
                    await videoTrack.applyConstraints({
                        width: { exact: video.videoWidth },
                        height: { exact: video.videoHeight },
                        frameRate: { exact: 60 }
                    });
                } catch (e) {}
            }
        }
    }

    // ============================================
    // PASO 1: GENERAR OFERTA
    // ============================================
    async function generateOffer() {
        peerConnection = new RTCPeerConnection(config);

        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }

        dataChannel = peerConnection.createDataChannel('chat');
        dataChannel.onopen = () => console.log('Canal abierto');
        dataChannel.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
        };

        peerConnection.ontrack = (event) => {
            video.srcObject = event.streams[0];
            video.play();
            updatePeerCount('add');
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        // Convertir oferta a código simple
        const offerString = JSON.stringify(peerConnection.localDescription);
        const offerCode = btoa(offerString); // Convertir a base64
        
        document.getElementById('offerCode').innerText = offerCode;
        
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    // ============================================
    // PASO 2: COPIAR OFERTA
    // ============================================
    function copyOffer() {
        const code = document.getElementById('offerCode').innerText;
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Código copiado');
        });
    }

    function showPasteStep() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
    }

    // ============================================
    // PASO 3: PROCESAR CÓDIGO
    // ============================================
    async function processCode() {
        const code = document.getElementById('pasteCode').value;
        if (!code) return;

        try {
            const offerString = atob(code); // Decodificar base64
            const offer = JSON.parse(offerString);

            if (!peerConnection) {
                peerConnection = new RTCPeerConnection(config);

                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    dataChannel.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
                    };
                };

                peerConnection.ontrack = (event) => {
                    video.srcObject = event.streams[0];
                    video.play();
                    updatePeerCount('add');
                };
            }

            await peerConnection.setRemoteDescription(offer);
            
            if (offer.type === 'offer') {
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                const answerString = JSON.stringify(peerConnection.localDescription);
                const answerCode = btoa(answerString);
                
                // Mostrar respuesta para que la copien
                document.getElementById('offerCode').innerText = answerCode;
                document.getElementById('step3').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('step2').querySelector('p').innerText = '4. Envía este código de vuelta:';
            } else {
                // Es una respuesta, conexión completa
                document.getElementById('step3').style.display = 'none';
                document.getElementById('step4').style.display = 'block';
                addChatMessage('🎬 Sistema', '¡Conectado! Calidad 4K', false);
            }
        } catch (e) {
            alert('❌ Código inválido');
        }
    }

    // ============================================
    // MOSTAR MODAL DE CONEXIÓN
    // ============================================
    function showConnectModal() {
        document.getElementById('connectModal').classList.add('active');
        // Resetear pasos
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'none';
        document.getElementById('pasteCode').value = '';
    }

    // ============================================
    // FUNCIONES BÁSICAS
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({type: 'chat', msg}));
        }
        
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count;
    }
</script>
</body>
</html>
