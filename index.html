<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K REAL</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* [Mantén el CSS igual] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #e50914;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5);
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 100px; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #e50914;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; background: rgba(229,9,20,0.2); }
        .quality-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #e50914, #b00710);
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 20px rgba(229,9,20,0.5);
            z-index: 10;
            white-space: nowrap;
        }
        .stats-overlay {
            position: absolute;
            bottom: 150px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            justify-content: space-around;
            border: 1px solid #e50914;
            z-index: 15;
        }
        .stat-item { text-align: center; }
        .stat-label { color: #888; margin-bottom: 4px; }
        .stat-value { color: #e50914; font-weight: bold; font-size: 14px; }
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #e50914;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: #e50914; }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #e50914;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: #e50914; text-align: right; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <div class="quality-badge" id="qualityBadge">⚡ 4K 50Mbps ⚡</div>
    
    <div class="stats-overlay" id="statsOverlay">
        <div class="stat-item">
            <div class="stat-label">BITRATE</div>
            <div class="stat-value" id="statBitrate">50 Mbps</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">RESOLUCIÓN</div>
            <div class="stat-value" id="statResolution">--</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">FPS</div>
            <div class="stat-value" id="statFPS">60</div>
        </div>
    </div>
</div>

<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('invite')" style="float:right; color:#888; font-size:24px;">✕</span>
        <h3 style="color:#e50914;">🔗 COMPARTIR 4K</h3>
        <p style="color:#888;">50Mbps · Sin compresión</p>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:#e50914; color:white; border:none; padding:15px;">COPIAR ENLACE</button>
    </div>
</div>

<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('chat')" style="float:right; color:#888; font-size:24px;">✕</span>
        <h3 style="color:#e50914;">💬 CHAT</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje...">
            <button onclick="sendMessage()" style="background:#e50914; color:white; border:none; width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let playTimeout;

    function init() {
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('status').innerText = '🟢 ' + id.substring(0,6);
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            // ========================================
            // SOLUCIÓN PARA ALTA CALIDAD
            // Forzar 50Mbps y resolución 4K
            // ========================================
            if (localStream) {
                // Opciones de alta calidad
                const options = {
                    videoBandwidth: 50000000, // 50 Mbps
                    audioBandwidth: 512000,
                    videoCodec: 'H264',
                    video: {
                        bitrate: 50000000,
                        maxBitrate: 50000000,
                        minBitrate: 50000000
                    }
                };
                
                call.answer(localStream, options);
                
                // Forzar resolución en el track
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.applyConstraints({
                        width: { exact: 3840 },  // Forzar 4K
                        height: { exact: 2160 },
                        frameRate: { exact: 60 }
                    }).catch(e => {
                        console.log('Usando resolución original');
                        // Si no se puede forzar 4K, usar la original
                        videoTrack.applyConstraints({
                            width: { exact: video.videoWidth },
                            height: { exact: video.videoHeight }
                        });
                    });
                }
            } else {
                call.answer();
            }
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
                
                // Mostrar resolución real
                setTimeout(() => {
                    const track = remoteStream.getVideoTracks()[0];
                    if (track && track.getSettings) {
                        const settings = track.getSettings();
                        document.getElementById('statResolution').innerHTML = 
                            settings.width + 'x' + settings.height;
                    }
                }, 1000);
            });
        });
    }

    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        video.src = URL.createObjectURL(file);
        video.play();
        document.getElementById('playPauseBtn').innerText = '⏸️';

        video.onloadeddata = () => {
            setTimeout(() => {
                if (video.captureStream) {
                    localStream = video.captureStream(60);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(60);
                }

                if (localStream) {
                    // Mostrar resolución original
                    document.getElementById('statResolution').innerHTML = 
                        video.videoWidth + 'x' + video.videoHeight;

                    connections.forEach(conn => {
                        if (conn.open) {
                            const options = {
                                videoBandwidth: 50000000,
                                audioBandwidth: 512000
                            };
                            peer.call(conn.peer, localStream, options);
                        }
                    });
                    
                    addChatMessage('🎬 4K', 'Transmisión 50Mbps iniciada', false);
                }
            }, 500);
        };
    }

    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream) {
                const options = {
                    videoBandwidth: 50000000,
                    audioBandwidth: 512000
                };
                peer.call(conn.peer, localStream, options);
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage('Amigo', data.msg, false);
            } else if (data.type === 'control') {
                if (data.action === 'play') {
                    video.play();
                    document.getElementById('playPauseBtn').innerText = '⏸️';
                }
                if (data.action === 'pause') {
                    video.pause();
                    document.getElementById('playPauseBtn').innerText = '▶️';
                }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerText = '✅ COPIADO';
        setTimeout(() => btn.innerText = 'COPIAR ENLACE', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count;
    }

    window.onload = init;
</script>
</body>
</html>
