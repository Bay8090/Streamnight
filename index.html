<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K ULTRA</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: red;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px red;
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 100px; color: white; }
        
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid red;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; }
        
        .quality-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid white;
            z-index: 10;
            white-space: nowrap;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
        
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: red; }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid red;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <div class="quality-badge" id="qualityBadge">⚡ 4K SIN COMPRESIÓN ⚡</div>
</div>

<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">🔗 COMPARTIR 4K</h3>
        <p style="color:#888;">CALIDAD ORIGINAL · SIN COMPRESIÓN</p>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:red; color:white; border:none; padding:15px;">COPIAR ENLACE</button>
    </div>
</div>

<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">💬 CHAT</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1;">
            <button onclick="sendMessage()" style="background:red; color:white; border:none; width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // VERSIÓN PEERJS QUE FUNCIONA - CON CALIDAD MÁXIMA
    // ============================================
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isBroadcasting = false;
    let playTimeout;

    function init() {
        // Usar PeerJS que ya funciona
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('status').innerHTML = `🟢 ${id.substring(0,6)}`;
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            if (localStream) call.answer(localStream);
            else call.answer();
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
    }

    // ============================================
    // EMITIR CON LA MÁXIMA CALIDAD POSIBLE
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        document.getElementById('playPauseBtn').innerHTML = '⏸️';

        // Cuando el video esté cargado, capturar stream
        video.onloadeddata = () => {
            setTimeout(() => {
                // Capturar stream a 60fps para máxima calidad
                if (video.captureStream) {
                    localStream = video.captureStream(60);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(60);
                }

                if (localStream) {
                    // ========================================
                    // TRUCO PARA MEJORAR CALIDAD
                    // ========================================
                    // Crear un canvas para no perder calidad
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    // Dibujar el video en el canvas cada frame
                    function drawVideo() {
                        if (!video.paused && !video.ended) {
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            requestAnimationFrame(drawVideo);
                        }
                    }
                    drawVideo();
                    
                    // Capturar del canvas (mejor calidad)
                    if (canvas.captureStream) {
                        localStream = canvas.captureStream(60);
                    }

                    isBroadcasting = true;
                    
                    // Llamar a todos los peers conectados
                    connections.forEach(conn => {
                        if (conn.open) {
                            peer.call(conn.peer, localStream);
                        }
                    });
                    
                    addChatMessage('🎬 4K', 'Transmisión SIN COMPRESIÓN iniciada', false);
                }
            }, 1000);
        };
    }

    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream && isBroadcasting) {
                peer.call(conn.peer, localStream);
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
            if (data.type === 'control') {
                if (data.action === 'play') { video.play(); document.getElementById('playPauseBtn').innerHTML = '⏸️'; }
                if (data.action === 'pause') { video.pause(); document.getElementById('playPauseBtn').innerHTML = '▶️'; }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerHTML = '▶️';
            document.getElementById('playPauseBtn').innerHTML = '⏸️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            icon.innerHTML = '⏸️';
            document.getElementById('playPauseBtn').innerHTML = '▶️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerHTML = '✅ COPIADO';
        setTimeout(() => btn.innerHTML = 'COPIAR ENLACE', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerHTML) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerHTML = count + ' 👥';
    }

    window.onload = init;
</script>
</body>
</html>
