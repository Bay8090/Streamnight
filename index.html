<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K SIN COMPRESIÓN</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Botones flotantes */
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #e50914;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        /* Overlay play/pause */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon {
            font-size: 100px;
            color: white;
            text-shadow: 0 0 30px #e50914;
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #e50914;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; }
        
        /* BADGE 4K SIN COMPRESIÓN */
        .quality-4k {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #e50914;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(229,9,20,0.5);
            z-index: 10;
            white-space: nowrap;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
        
        /* Toolbar */
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #e50914;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: #e50914; }
        
        /* Paneles */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #e50914;
        }
        .modal-content h3 { color: #e50914; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }
        .close:hover { color: #e50914; }
        
        /* Chat */
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        .message.own { background: #e50914; text-align: right; }
        .chat-input-group {
            display: flex;
            gap: 5px;
        }
        .chat-input-group button {
            width: 60px;
            background: #e50914;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <!-- Overlay play/pause -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <!-- Botones flotantes -->
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <!-- Badges -->
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <!-- BADGE 4K SIN COMPRESIÓN (MUY VISIBLE) -->
    <div class="quality-4k" id="qualityBadge">⚡ 4K SIN COMPRESIÓN ⚡</div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<!-- Modal Invitación -->
<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('invite')">✕</span>
        <h3>🔗 COMPARTIR 4K</h3>
        <p style="color:#888;">CALIDAD ORIGINAL · SIN COMPRESIÓN</p>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:#e50914; color:white; border:none; padding:15px; border-radius:8px;">📋 COPIAR ENLACE</button>
    </div>
</div>

<!-- Modal Chat -->
<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('chat')">✕</span>
        <h3>💬 CHAT 4K</h3>
        <div id="chatMessages"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Mensaje...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // VERSIÓN 4K SIN COMPRESIÓN
    // ============================================
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isBroadcasting = false;
    let playTimeout;

    function init() {
        peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', (id) => {
            document.getElementById('status').innerHTML = `🟢 ${id.substring(0,6)}`;
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) connectToPeer(targetId);
        });

        peer.on('connection', (conn) => setupConnection(conn));

        peer.on('call', (call) => {
            if (localStream) call.answer(localStream);
            else call.answer();
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
    }

    // ============================================
    // EMITIR - SIN COMPRESIÓN
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Mostrar resolución del archivo
        const videoElement = document.createElement('video');
        videoElement.preload = 'metadata';
        videoElement.src = URL.createObjectURL(file);
        
        videoElement.onloadedmetadata = () => {
            const width = videoElement.videoWidth;
            const height = videoElement.videoHeight;
            const is4K = width >= 3840 || height >= 2160;
            
            if (is4K) {
                document.getElementById('qualityBadge').innerHTML = '⚡ 4K ULTRA · SIN COMPRESIÓN ⚡';
            }
            
            // Reproducir localmente
            video.src = URL.createObjectURL(file);
            video.play();
            document.getElementById('playPauseBtn').innerHTML = '⏸️';

            // Capturar stream SIN COMPRESIÓN
            setTimeout(() => {
                if (video.captureStream) {
                    // Capturar a 60fps para máxima calidad
                    localStream = video.captureStream(60);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(60);
                }

                if (localStream) {
                    // ========================================
                    // DESACTIVAR TODA COMPRESIÓN
                    // ========================================
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        // Forzar que NO comprima
                        const constraints = {
                            width: { exact: width },
                            height: { exact: height },
                            frameRate: { exact: 60 },
                            // Desactivar compresión
                            googCpuOveruseDetection: false,
                            googCpuUnderuseThreshold: 100,
                            googHighStartBitrate: true,
                            googVeryHighBitrate: true,
                            googNoiseReduction: false
                        };
                        
                        try {
                            videoTrack.applyConstraints(constraints);
                        } catch (e) {
                            console.log('No se pudieron aplicar constraints');
                        }
                    }

                    isBroadcasting = true;
                    
                    // Enviar a todos SIN COMPRESIÓN
                    connections.forEach(conn => {
                        if (conn.open) {
                            peer.call(conn.peer, localStream);
                        }
                    });
                    
                    addChatMessage('🎬 4K', 'Transmisión SIN COMPRESIÓN iniciada', false);
                }
            }, 500);
        };
    }

    // ============================================
    // RESTO DE FUNCIONES IGUAL
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            if (localStream && isBroadcasting) {
                peer.call(conn.peer, localStream);
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
            if (data.type === 'control') {
                if (data.action === 'play') { video.play(); document.getElementById('playPauseBtn').innerHTML = '⏸️'; }
                if (data.action === 'pause') { video.pause(); document.getElementById('playPauseBtn').innerHTML = '▶️'; }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerHTML = '▶️';
            document.getElementById('playPauseBtn').innerHTML = '⏸️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            icon.innerHTML = '⏸️';
            document.getElementById('playPauseBtn').innerHTML = '▶️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        connections.forEach(c => c.open && c.send({type: 'chat', msg}));
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerHTML = '✅ COPIADO';
        setTimeout(() => btn.innerHTML = '📋 COPIAR ENLACE', 2000);
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerHTML) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerHTML = count + ' 👥';
    }

    window.onload = init;
</script>
</body>
</html>
