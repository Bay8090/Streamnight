<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            max-height: 100%;
            background: #000;
        }
        
        /* Botones básicos */
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: red;
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        /* Badges simples */
        .status {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        .peer-count {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        
        /* Overlay play/pause */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 80px; color: white; }
        
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 15px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-red { background: red; }
        
        .panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            padding: 20px;
            z-index: 200;
        }
        .panel.active { display: flex; align-items: center; justify-content: center; }
        .panel-content {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 5px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }
        .orientation-warning {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: red;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid red;
            display: none;
            z-index: 150;
        }
        .orientation-warning.visible { display: block; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <!-- Overlay play/pause -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <!-- Botones -->
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <!-- Estado -->
    <div class="status" id="status">Iniciando...</div>
    <div class="peer-count" id="peerCount">0 conectados</div>
    
    <!-- Advertencia orientación -->
    <div class="orientation-warning" id="orientationWarning">
        🔄 Gira el teléfono
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR</button>
    <button class="btn" onclick="showPanel('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showPanel('chat')">💬 CHAT</button>
</div>

<!-- Panel Invitación -->
<div id="invitePanel" class="panel" onclick="hidePanel('invite')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hidePanel('invite')">✕</span>
        <h3 style="color:red;">Compartir</h3>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:red; color:white; border:none; padding:15px; border-radius:5px;">COPIAR</button>
    </div>
</div>

<!-- Panel Chat -->
<div id="chatPanel" class="panel" onclick="hidePanel('chat')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hidePanel('chat')">✕</span>
        <h3 style="color:red;">Chat</h3>
        <div id="chatMessages"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1;">
            <button onclick="sendMessage()" style="background:red; color:white; border:none; width:60px; border-radius:5px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // VERSIÓN SIMPLE QUE FUNCIONA
    // ============================================
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let isBroadcasting = false;
    let playTimeout;

    function init() {
        // Peer SIN configuraciones complejas
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('status').innerText = 'ID: ' + id.substring(0,6);
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            // Auto-conectar
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });

        // Conexiones de datos
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // Llamadas de video
        peer.on('call', (call) => {
            // Si estamos emitiendo, responder con nuestro stream
            if (localStream) {
                call.answer(localStream);
            } else {
                call.answer();
            }
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
        
        // Detectar orientación
        checkOrientation();
        window.addEventListener('orientationchange', checkOrientation);
    }

    // ============================================
    // EMITIR (SIMPLE)
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        document.getElementById('playPauseBtn').innerText = '⏸️';

        // Capturar stream después de cargar
        video.onloadeddata = () => {
            setTimeout(() => {
                // Capturar stream (sin opciones complejas)
                if (video.captureStream) {
                    localStream = video.captureStream(30);
                } else if (video.mozCaptureStream) {
                    localStream = video.mozCaptureStream(30);
                }

                if (localStream) {
                    isBroadcasting = true;
                    
                    // Llamar a todos los conectados
                    connections.forEach(conn => {
                        if (conn.open) {
                            peer.call(conn.peer, localStream);
                        }
                    });
                    
                    // Mostrar calidad
                    addChatMessage('Sistema', '📡 Transmitiendo - 50 Mbps', false);
                }
            }, 500);
        };
    }

    // ============================================
    // CONEXIONES
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');

        conn.on('open', () => {
            // Si estamos emitiendo, enviar stream
            if (localStream && isBroadcasting) {
                peer.call(conn.peer, localStream);
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage('Amigo', data.msg, false);
            } else if (data.type === 'control') {
                if (data.action === 'play') {
                    video.play();
                    document.getElementById('playPauseBtn').innerText = '⏸️';
                }
                if (data.action === 'pause') {
                    video.pause();
                    document.getElementById('playPauseBtn').innerText = '▶️';
                }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
    }

    // ============================================
    // PLAY/PAUSE CON OVERLAY
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'play'}));
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
            connections.forEach(c => c.open && c.send({type: 'control', action: 'pause'}));
        }

        overlay.classList.add('visible');
        
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // ============================================
    // ORIENTACIÓN
    // ============================================
    function checkOrientation() {
        if (window.orientation === 0 || window.orientation === 180) {
            document.getElementById('orientationWarning').classList.add('visible');
            setTimeout(() => {
                document.getElementById('orientationWarning').classList.remove('visible');
            }, 3000);
        }
    }

    // ============================================
    // CHAT
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        
        connections.forEach(conn => {
            if (conn.open) conn.send({type: 'chat', msg: msg});
        });
        
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // ============================================
    // INTERFAZ
    // ============================================
    function showPanel(id) { document.getElementById(id + 'Panel').classList.add('active'); }
    function hidePanel(id) { document.getElementById(id + 'Panel').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        alert('¡Enlace copiado!');
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count + ' conectados';
    }

    window.onload = init;
</script>
</body>
</html>
