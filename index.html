<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Simple</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .controls {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        button {
            flex: 1;
            padding: 15px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            background: #333;
        }
        .btn-red {
            background: red;
        }
        .btn-red:active {
            background: #ff3333;
        }
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            padding: 20px;
            z-index: 100;
        }
        .panel.active {
            display: block;
        }
        .panel-content {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 50px auto;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 5px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own {
            background: red;
            text-align: right;
        }
        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            border: 1px solid #444;
        }
        .peer-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            border: 1px solid #444;
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            border: 1px solid red;
        }
        .fullscreen-btn:active {
            background: red;
        }
        .rotate-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            border: 1px solid red;
        }
        .rotate-btn:active {
            background: red;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }
        .play-overlay.visible {
            opacity: 1;
        }
        .play-icon {
            font-size: 80px;
            color: white;
            text-shadow: 0 0 20px red;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        .badge {
            background: red;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline webkit-playsinline></video>
    
    <!-- Play/Pause Overlay -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <div class="status" id="status">Iniciando...</div>
    <div class="peer-count" id="peerCount">0 <span class="badge">50 Mbps</span></div>
    
    <!-- Botones flotantes -->
    <div class="fullscreen-btn" onclick="toggleFullscreen(event)">⛶</div>
    <div class="rotate-btn" onclick="toggleOrientation(event)">🔄</div>
</div>

<div class="controls">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn-red" onclick="document.getElementById('fileInput').click()">📹 Emitir</button>
    <button onclick="showInvite()">🔗 Invitar</button>
    <button onclick="showChat()">💬 Chat</button>
</div>

<!-- Panel de invitación -->
<div id="invitePanel" class="panel" onclick="hidePanel('invitePanel')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hidePanel('invitePanel')">✕</span>
        <h3 style="margin-bottom: 15px; color: red;">Compartir Stream</h3>
        <p style="color:#888; margin-bottom:10px;">50 Mbps · Sin compresión · 4K Ready</p>
        <input type="text" id="inviteLink" readonly value="Generando...">
        <button onclick="copyLink()" style="width:100%; background: red;">Copiar enlace</button>
    </div>
</div>

<!-- Panel de chat -->
<div id="chatPanel" class="panel" onclick="hidePanel('chatPanel')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hidePanel('chatPanel')">✕</span>
        <h3 style="margin-bottom: 15px; color: red;">Chat</h3>
        <div id="chatMessages"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Escribe..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="flex:0 0 60px; background: red;">➤</button>
        </div>
    </div>
</div>

<script>
    // Variables globales
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    let playTimeout;
    
    // ============================================
    // INICIALIZACIÓN
    // ============================================
    function init() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            document.getElementById('status').innerHTML = '🟢 ID: ' + id.substring(0,6);
            const link = window.location.href.split('?')[0] + '?id=' + id;
            document.getElementById('inviteLink').value = link;
            
            // Conectar si venimos de un enlace
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });
        
        // Recibir conexiones de chat
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });
        
        // Recibir stream de video
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
        
        // Detectar orientación
        checkOrientation();
        window.addEventListener('orientationchange', checkOrientation);
    }
    
    // ============================================
    // EMITIR VIDEO (SIN LÍMITE DE BITRATE)
    // ============================================
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        
        // Reproducir localmente
        const url = URL.createObjectURL(file);
        video.src = url;
        video.play();
        
        // Capturar y enviar stream (sin límite de bitrate)
        video.onloadeddata = () => {
            setTimeout(() => {
                // Capturar stream con la máxima calidad posible
                localStream = video.captureStream ? video.captureStream(60) : video.mozCaptureStream(60);
                
                // Enviar a todos los conectados
                connections.forEach(conn => {
                    if (conn.open) {
                        const call = peer.call(conn.peer, localStream);
                        // Sin restricciones de bitrate
                    }
                });
            }, 500);
        };
    }
    
    // ============================================
    // CONECTAR A OTRO PEER
    // ============================================
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }
    
    // ============================================
    // CONFIGURAR CONEXIÓN
    // ============================================
    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');
        
        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage(data.user, data.msg, false);
            } else if (data.type === 'control') {
                if (data.action === 'play') video.play();
                if (data.action === 'pause') video.pause();
            }
        });
        
        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
        
        // Enviar stream si estamos emitiendo
        if (localStream) {
            peer.call(conn.peer, localStream);
        }
    }
    
    // ============================================
    // PLAY/PAUSE CON OVERLAY (5 SEGUNDOS)
    // ============================================
    function togglePlay(event) {
        // Evitar que el click en botones active esto
        if (event.target.classList.contains('fullscreen-btn') || 
            event.target.classList.contains('rotate-btn')) {
            return;
        }
        
        if (!video.srcObject && !video.src) return;
        
        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');
        
        if (video.paused) {
            video.play();
            icon.textContent = '▶️';
            
            // Notificar a todos
            connections.forEach(conn => {
                if (conn.open) conn.send({type: 'control', action: 'play'});
            });
        } else {
            video.pause();
            icon.textContent = '⏸️';
            
            // Notificar a todos
            connections.forEach(conn => {
                if (conn.open) conn.send({type: 'control', action: 'pause'});
            });
        }
        
        // Mostrar overlay
        overlay.classList.add('visible');
        
        // Ocultar después de 5 segundos
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }
    
    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }
    
    // ============================================
    // ORIENTACIÓN AUTOMÁTICA
    // ============================================
    function toggleOrientation(event) {
        event.stopPropagation();
        
        if (screen.orientation && screen.orientation.lock) {
            if (window.orientation === 0 || window.orientation === 180) {
                screen.orientation.lock('landscape').catch(() => {});
            } else {
                screen.orientation.lock('portrait').catch(() => {});
            }
        }
    }
    
    function checkOrientation() {
        // Si está en vertical, sugerir girar
        if (window.orientation === 0 || window.orientation === 180) {
            // Mostrar mensaje sutil
            document.getElementById('status').innerHTML = '🟡 Gira el teléfono ↻';
            setTimeout(() => {
                const id = peer?.id || '';
                document.getElementById('status').innerHTML = '🟢 ID: ' + id.substring(0,6);
            }, 3000);
        }
    }
    
    // ============================================
    // CHAT
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        
        addChatMessage('Tú', msg, true);
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    type: 'chat',
                    user: 'Amigo',
                    msg: msg
                });
            }
        });
        
        input.value = '';
    }
    
    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
    
    // ============================================
    // INTERFAZ
    // ============================================
    function showInvite() {
        document.getElementById('invitePanel').classList.add('active');
    }
    
    function showChat() {
        document.getElementById('chatPanel').classList.add('active');
    }
    
    function hidePanel(id) {
        document.getElementById(id).classList.remove('active');
    }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        const original = btn.innerText;
        btn.innerText = '✅ Copiado!';
        setTimeout(() => btn.innerText = original, 2000);
    }
    
    function updatePeerCount(action) {
        const countEl = document.getElementById('peerCount');
        let count = parseInt(countEl.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        countEl.innerHTML = count + ' <span class="badge">50 Mbps</span>';
    }
    
    window.onload = init;
</script>
</body>
</html>
