<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Simple</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        video {
            width: 100%;
            max-height: 100%;
            background: #000;
        }
        .controls {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        button {
            flex: 1;
            padding: 15px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-red {
            background: red;
        }
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            padding: 20px;
            z-index: 100;
        }
        .panel.active {
            display: block;
        }
        .panel-content {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 50px auto;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 5px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own {
            background: red;
            text-align: right;
        }
        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        .peer-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay()">
    <video id="video" playsinline></video>
    <div class="status" id="status">Iniciando...</div>
    <div class="peer-count" id="peerCount">0 conectados</div>
</div>

<div class="controls">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn-red" onclick="document.getElementById('fileInput').click()">📹 Emitir</button>
    <button onclick="showInvite()">🔗 Invitar</button>
    <button onclick="showChat()">💬 Chat</button>
</div>

<!-- Panel de invitación -->
<div id="invitePanel" class="panel">
    <div class="panel-content">
        <span class="close" onclick="hidePanel('invitePanel')">✕</span>
        <h3 style="margin-bottom: 15px;">Compartir Stream</h3>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%;">Copiar enlace</button>
    </div>
</div>

<!-- Panel de chat -->
<div id="chatPanel" class="panel">
    <div class="panel-content">
        <span class="close" onclick="hidePanel('chatPanel')">✕</span>
        <h3 style="margin-bottom: 15px;">Chat</h3>
        <div id="chatMessages"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Escribe..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="flex:0 0 60px;">➤</button>
        </div>
    </div>
</div>

<script>
    // Variables globales
    const video = document.getElementById('video');
    let peer, connections = [], localStream = null;
    
    // Inicializar
    function init() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            document.getElementById('status').innerText = 'ID: ' + id.substring(0,6);
            document.getElementById('inviteLink').value = window.location.href + '?id=' + id;
            
            // Conectar si venimos de un enlace
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== id) {
                connectToPeer(targetId);
            }
        });
        
        // Recibir conexiones de chat
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });
        
        // Recibir stream de video
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                video.play();
                updatePeerCount('add');
            });
        });
    }
    
    // Emitir video
    function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        
        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        video.play();
        
        // Capturar y enviar stream
        video.onloadeddata = () => {
            setTimeout(() => {
                localStream = video.captureStream ? video.captureStream(30) : video.mozCaptureStream(30);
                
                connections.forEach(conn => {
                    if (conn.open) {
                        peer.call(conn.peer, localStream);
                    }
                });
            }, 500);
        };
    }
    
    // Conectar a otro peer
    function connectToPeer(id) {
        const conn = peer.connect(id);
        setupConnection(conn);
    }
    
    // Configurar conexión (chat)
    function setupConnection(conn) {
        connections.push(conn);
        updatePeerCount('add');
        
        conn.on('data', (data) => {
            addChatMessage(data.user, data.msg, false);
        });
        
        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            updatePeerCount('remove');
        });
        
        // Enviar stream si estamos emitiendo
        if (localStream) {
            peer.call(conn.peer, localStream);
        }
    }
    
    // Play/Pause
    function togglePlay() {
        if (!video.srcObject && !video.src) return;
        video.paused ? video.play() : video.pause();
    }
    
    // Chat
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        
        addChatMessage('Tú', msg, true);
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    user: 'Amigo',
                    msg: msg
                });
            }
        });
        
        input.value = '';
    }
    
    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
    
    // Interfaz
    function showInvite() {
        document.getElementById('invitePanel').classList.add('active');
    }
    
    function showChat() {
        document.getElementById('chatPanel').classList.add('active');
    }
    
    function hidePanel(id) {
        document.getElementById(id).classList.remove('active');
    }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        alert('¡Enlace copiado!');
    }
    
    function updatePeerCount(action) {
        const countEl = document.getElementById('peerCount');
        let count = parseInt(countEl.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove') count--;
        countEl.innerText = count + ' conectados';
    }
    
    window.onload = init;
</script>
</body>
</html>
