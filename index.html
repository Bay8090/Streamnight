<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Streamnight · P2P 4K · 50 Mbps</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* Header */
        .header {
            background: rgba(10, 10, 10, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 30;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 20px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .peer-id {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Contenedor de video */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay de play/pause */
        .play-pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }

        .play-pause-overlay.visible {
            opacity: 1;
        }

        .play-pause-icon {
            font-size: 80px;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Overlay de información */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
        }

        .quality-badge {
            background: rgba(0, 255, 255, 0.9);
            color: #000;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
        }

        .stats-grid {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 30px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        /* Orientación warning */
        .orientation-warning {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #00ffff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #00ffff;
            display: none;
            z-index: 60;
            white-space: nowrap;
        }

        .orientation-warning.visible {
            display: block;
        }

        /* Chat */
        .chat-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 300px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .chat-sidebar.active {
            transform: translateX(0);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: #00ffff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
        }

        .message.own {
            align-self: flex-end;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
        }

        .message.own .message-bubble {
            background: #00ffff;
            color: #000;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ffff;
        }

        .chat-send {
            width: 45px;
            height: 45px;
            border-radius: 45px;
            background: #00ffff;
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
        }

        /* Toolbar */
        .toolbar {
            background: rgba(10, 10, 10, 0.95);
            padding: 16px 24px;
            display: flex;
            gap: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            z-index: 30;
        }

        .tool-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        .tool-btn.primary {
            background: #00ffff;
            color: #000;
            border: none;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #00ffff;
        }

        .link-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .link-box input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: white;
        }

        .copy-btn {
            background: #00ffff;
            border: none;
            color: #000;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-text">🌙 Streamnight</span>
        </div>
        <div class="header-actions">
            <span class="peer-id" id="peerIdDisplay">Conectando...</span>
            <button class="btn-icon" onclick="toggleChat()">💬</button>
            <button class="btn-icon" onclick="showInvite()">👥</button>
        </div>
    </div>

    <!-- Video container -->
    <div class="video-container" onclick="togglePlay()">
        <video id="videoPlayer" playsinline webkit-playsinline></video>
        
        <!-- Play/Pause Overlay (5 segundos) -->
        <div class="play-pause-overlay" id="playPauseOverlay">
            <div class="play-pause-icon" id="playPauseIcon">▶️</div>
        </div>
        
        <!-- Overlay info -->
        <div class="video-overlay">
            <div class="quality-badge" id="qualityBadge">
                4K · 50 Mbps
            </div>
            <div class="stats-grid">
                <div class="stat">
                    <span>📊</span>
                    <span id="bitrateStat">50 Mbps</span>
                </div>
                <div class="stat">
                    <span>👥</span>
                    <span id="viewerCount">0</span>
                </div>
            </div>
        </div>

        <!-- Orientación warning -->
        <div class="orientation-warning" id="orientationWarning">
            🌙 Gira el dispositivo para mejor experiencia
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-header">
            <h3>Chat</h3>
            <button class="btn-icon" onclick="toggleChat()" style="width:30px;height:30px;">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="file" id="fileInput" hidden accept="video/*" onchange="startBroadcasting(event)">
        <button class="tool-btn primary" onclick="document.getElementById('fileInput').click()">
            📁 Emitir
        </button>
        <button class="tool-btn" onclick="toggleMute()" id="muteBtn">
            🔊 Audio
        </button>
        <button class="tool-btn" onclick="toggleFullscreen()">
            ⛶ Pantalla completa
        </button>
        <button class="tool-btn" onclick="toggleOrientation()">
            🔄 Girar
        </button>
    </div>
</div>

<!-- Modal invitación -->
<div class="modal" id="inviteModal" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:#00ffff;">Compartir</h2>
        <p style="color:#888;">Enlace directo P2P:</p>
        <div class="link-box">
            <input type="text" id="inviteLink" readonly value="Generando...">
            <button class="copy-btn" onclick="copyInviteLink()">Copiar</button>
        </div>
    </div>
</div>

<script>
    // Configuración
    const CONFIG = {
        BITRATE: 50000000,
        FPS: 30,
        STUN_SERVERS: [
            'stun:stun.l.google.com:19302',
            'stun:stun1.l.google.com:19302'
        ]
    };

    // Elementos DOM
    const video = document.getElementById('videoPlayer');
    let peer;
    let connections = [];
    let myStream = null;
    let broadcastActive = false;
    let userName = 'User_' + Math.floor(Math.random() * 1000);
    let playPauseTimeout;

    // ============================================
    // FUNCIÓN CRÍTICA: INICIALIZACIÓN CORREGIDA
    // ============================================
    function init() {
        console.log('🎬 Inicializando Streamnight...');
        
        // Configurar PeerJS con opciones más estables
        peer = new Peer({
            config: {
                iceServers: CONFIG.STUN_SERVERS.map(url => ({ urls: url })),
                iceTransportPolicy: 'all'
            },
            debug: 2 // Para ver más detalles en consola
        });

        peer.on('open', (id) => {
            console.log('✅ PeerJS conectado con ID:', id);
            document.getElementById('peerIdDisplay').innerHTML = `🌙 ${id.substring(0,8)}`;
            
            // Generar link de invitación
            const link = `${window.location.origin}${window.location.pathname}#${id}`;
            document.getElementById('inviteLink').value = link;
            
            // Auto-conectar si hay hash
            if(window.location.hash) {
                const hostId = window.location.hash.substring(1);
                console.log('🔗 Conectando a host:', hostId);
                connectToHost(hostId);
            }
        });

        // ========================================
        // CORRECCIÓN: Manejo de llamadas entrantes
        // ========================================
        peer.on('call', (call) => {
            console.log('📞 Llamada entrante de:', call.peer);
            
            // Responder a la llamada
            call.answer();
            
            call.on('stream', (remoteStream) => {
                console.log('📺 Stream recibido correctamente');
                
                // Asignar stream al video
                video.srcObject = remoteStream;
                
                // Forzar reproducción
                video.play()
                    .then(() => {
                        console.log('▶️ Reproducción iniciada');
                        updateViewerCount('add');
                    })
                    .catch(e => {
                        console.error('Error al reproducir:', e);
                        // Intentar con muted
                        video.muted = true;
                        video.play().then(() => {
                            console.log('▶️ Reproducción iniciada (muted)');
                            updateViewerCount('add');
                        });
                    });
            });

            call.on('error', (err) => {
                console.error('❌ Error en llamada:', err);
            });

            call.on('close', () => {
                console.log('📞 Llamada cerrada');
                updateViewerCount('remove');
            });
        });

        // ========================================
        // CORRECCIÓN: Conexiones de datos
        // ========================================
        peer.on('connection', (conn) => {
            console.log('🔌 Conexión de datos de:', conn.peer);
            
            connections.push(conn);
            updateViewerCount('add');
            
            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    addChatMessage(data.user, data.message, false);
                } else if (data.type === 'control') {
                    // Control remoto (play/pause)
                    if (data.action === 'play') video.play();
                    if (data.action === 'pause') video.pause();
                }
            });

            conn.on('close', () => {
                connections = connections.filter(c => c.peer !== conn.peer);
                updateViewerCount('remove');
            });

            // Enviar mensaje de bienvenida
            conn.send({
                type: 'chat',
                user: 'Sistema',
                message: 'Bienvenido a Streamnight 🌙'
            });
        });

        peer.on('error', (err) => {
            console.error('❌ PeerJS error:', err);
        });

        // Detectar orientación
        setupOrientationDetection();
    }

    // ========================================
    // CORRECCIÓN: Emitir video (Broadcaster)
    // ========================================
    async function startBroadcasting(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        try {
            console.log('🎥 Archivo seleccionado:', file.name);
            
            // Crear URL del video
            const url = URL.createObjectURL(file);
            video.src = url;
            
            // Esperar a que cargue el video
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
            });
            
            // Reproducir localmente
            await video.play();
            console.log('✅ Video local reproduciendo');
            
            // Capturar stream
            if (video.captureStream) {
                myStream = video.captureStream(CONFIG.FPS);
                console.log('📡 Stream capturado');
            } else if (video.mozCaptureStream) {
                myStream = video.mozCaptureStream(CONFIG.FPS);
            } else {
                throw new Error('CaptureStream no soportado');
            }
            
            broadcastActive = true;
            document.getElementById('qualityBadge').innerHTML = '🔴 EMITIENDO · 4K';
            
            // Notificar a peers conectados
            connections.forEach(conn => {
                if (conn.open) {
                    console.log('📞 Llamando a peer:', conn.peer);
                    
                    const call = peer.call(conn.peer, myStream, {
                        videoBandwidth: CONFIG.BITRATE,
                        metadata: { quality: '4K', bitrate: '50Mbps' }
                    });
                    
                    call.on('error', (err) => {
                        console.error('Error en llamada a peer:', err);
                    });
                }
            });
            
        } catch (error) {
            console.error('❌ Error broadcasting:', error);
            alert('Error al emitir. Revisa la consola.');
        }
    }

    // ========================================
    // CORRECCIÓN: Conectar a host (Viewer)
    // ========================================
    function connectToHost(hostId) {
        console.log('🔗 Intentando conectar a:', hostId);
        
        // Primero conectar canal de datos
        const conn = peer.connect(hostId);
        
        conn.on('open', () => {
            console.log('✅ Canal de datos abierto');
            connections.push(conn);
            updateViewerCount('add');
            addChatMessage('Sistema', 'Conectado al stream', false);
            
            // Luego solicitar stream
            console.log('📞 Solicitando stream...');
            const call = peer.call(hostId, null); // null porque no enviamos stream
            
            call.on('stream', (remoteStream) => {
                console.log('📺 Stream recibido!');
                video.srcObject = remoteStream;
                
                // Intentar reproducir (necesita interacción del usuario)
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => {
                        console.log('Autoplay bloqueado, esperando interacción');
                        // Mostrar mensaje para hacer clic
                        addChatMessage('Sistema', 'Haz clic en el video para reproducir', false);
                    });
                }
            });
            
            call.on('error', (err) => {
                console.error('❌ Error al recibir stream:', err);
                addChatMessage('Sistema', 'Error al conectar stream', false);
            });
        });
        
        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addChatMessage(data.user, data.message, false);
            }
        });
    }

    // ========================================
    // Play/Pause Overlay (5 segundos)
    // ========================================
    function togglePlay() {
        if (!video.srcObject && !video.src) return;
        
        const overlay = document.getElementById('playPauseOverlay');
        const icon = document.getElementById('playPauseIcon');
        
        if (video.paused) {
            video.play();
            icon.textContent = '▶️';
        } else {
            video.pause();
            icon.textContent = '⏸️';
        }
        
        // Mostrar overlay
        overlay.classList.add('visible');
        
        // Enviar comando a peers
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    type: 'control',
                    action: video.paused ? 'pause' : 'play'
                });
            }
        });
        
        // Ocultar después de 5 segundos
        clearTimeout(playPauseTimeout);
        playPauseTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    // ========================================
    // Detección de orientación
    // ========================================
    function setupOrientationDetection() {
        window.addEventListener('orientationchange', function() {
            const warning = document.getElementById('orientationWarning');
            
            if (window.orientation === 0 || window.orientation === 180) {
                // Vertical
                warning.classList.add('visible');
                setTimeout(() => warning.classList.remove('visible'), 3000);
            } else {
                // Horizontal
                warning.classList.remove('visible');
            }
        });
        
        // Detectar al inicio
        setTimeout(() => {
            if (window.orientation === 0 || window.orientation === 180) {
                document.getElementById('orientationWarning').classList.add('visible');
                setTimeout(() => {
                    document.getElementById('orientationWarning').classList.remove('visible');
                }, 3000);
            }
        }, 1000);
    }

    function toggleOrientation() {
        if (screen.orientation && screen.orientation.lock) {
            if (window.orientation === 0 || window.orientation === 180) {
                screen.orientation.lock('landscape').catch(e => console.log(e));
            } else {
                screen.orientation.lock('portrait').catch(e => console.log(e));
            }
        } else {
            alert('Usa la rotación automática del dispositivo');
        }
    }

    // ========================================
    // Funciones de chat (sin cambios)
    // ========================================
    function toggleChat() {
        document.getElementById('chatSidebar').classList.toggle('active');
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        
        addChatMessage(userName, message, true);
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    type: 'chat',
                    user: userName,
                    message: message
                });
            }
        });
        
        input.value = '';
    }
    
    function addChatMessage(user, message, isOwn) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : ''}`;
        
        msgDiv.innerHTML = `<div class="message-bubble"><strong>${user}:</strong> ${message}</div>`;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('muteBtn').innerHTML = video.muted ? '🔇 Audio' : '🔊 Audio';
    }
    
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }
    
    function showInvite() {
        document.getElementById('inviteModal').classList.add('active');
    }
    
    function copyInviteLink() {
        const input = document.getElementById('inviteLink');
        input.select();
        document.execCommand('copy');
        
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copiado';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
    }

    function updateViewerCount(action) {
        const countEl = document.getElementById('viewerCount');
        let count = parseInt(countEl.textContent) || 0;
        
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        
        countEl.textContent = count;
    }

    // Iniciar
    window.onload = init;
</script>
</body>
</html>
