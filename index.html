<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · WebRTC 4K</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: red;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 100px; color: white; }
        
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid red;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; }
        
        .quality-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            white-space: nowrap;
        }
        
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: red; }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid red;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
        .signal-step {
            display: none;
        }
        .signal-step.active { display: block; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <div class="quality-badge" id="qualityBadge">⚡ WEBRTC 4K ⚡</div>
</div>

<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showSignaling()">🔗 CONECTAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<!-- Panel de señalización WebRTC -->
<div id="signalModal" class="modal" onclick="hideModal('signal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="hideModal('signal')">✕</span>
        <h3 style="color:red;">🔌 CONEXIÓN WEBRTC</h3>
        
        <!-- PASO 1: Crear oferta (emisor) -->
        <div id="step1" class="signal-step active">
            <p style="color:#888;">1. Copia esta OFERTA y envíala a tu amigo:</p>
            <textarea id="offerText" rows="4" readonly></textarea>
            <button onclick="copyOffer()" style="width:100%; background:red; color:white; border:none; padding:10px;">📋 COPIAR OFERTA</button>
        </div>
        
        <!-- PASO 2: Ingresar oferta (receptor) -->
        <div id="step2" class="signal-step">
            <p style="color:#888;">2. Pega la OFERTA que te envió tu amigo:</p>
            <textarea id="remoteOfferText" rows="4" placeholder="Pega aquí la oferta..."></textarea>
            <button onclick="processOffer()" style="width:100%; background:red; color:white; border:none; padding:10px;">📥 PROCESAR OFERTA</button>
        </div>
        
        <!-- PASO 3: Copiar respuesta (receptor) -->
        <div id="step3" class="signal-step">
            <p style="color:#888;">3. Copia esta RESPUESTA y envíala a tu amigo:</p>
            <textarea id="answerText" rows="4" readonly></textarea>
            <button onclick="copyAnswer()" style="width:100%; background:red; color:white; border:none; padding:10px;">📋 COPIAR RESPUESTA</button>
        </div>
        
        <!-- PASO 4: Ingresar respuesta (emisor) -->
        <div id="step4" class="signal-step">
            <p style="color:#888;">4. Pega la RESPUESTA de tu amigo:</p>
            <textarea id="remoteAnswerText" rows="4" placeholder="Pega aquí la respuesta..."></textarea>
            <button onclick="processAnswer()" style="width:100%; background:red; color:white; border:none; padding:10px;">🔗 COMPLETAR CONEXIÓN</button>
        </div>
    </div>
</div>

<!-- Modal Chat -->
<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">💬 CHAT</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1;">
            <button onclick="sendMessage()" style="background:red; color:white; border:none; width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // WEBRTC PURO - MÁXIMA CALIDAD
    // ============================================
    const video = document.getElementById('video');
    let peerConnection;
    let dataChannel;
    let localStream = null;
    let remoteStream = null;
    let playTimeout;
    let isInitiator = false;

    // Configuración para MÁXIMA CALIDAD
    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    // ============================================
    // 1. EMITIR VIDEO (CAPTURAR STREAM)
    // ============================================
    async function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        // Reproducir localmente
        video.src = URL.createObjectURL(file);
        await video.play();
        document.getElementById('playPauseBtn').innerText = '⏸️';

        // Esperar metadata
        await new Promise(resolve => video.onloadedmetadata = resolve);

        // Capturar stream con MÁXIMA CALIDAD
        if (video.captureStream) {
            localStream = video.captureStream(60); // 60fps
        } else if (video.mozCaptureStream) {
            localStream = video.mozCaptureStream(60);
        }

        if (localStream) {
            // Forzar configuración de alta calidad
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                await videoTrack.applyConstraints({
                    width: { exact: video.videoWidth },
                    height: { exact: video.videoHeight },
                    frameRate: { ideal: 60 }
                }).catch(e => console.log('Constraints no aplicables'));
            }
        }
    }

    // ============================================
    // 2. CREAR CONEXIÓN (INICIADOR)
    // ============================================
    async function createConnection() {
        peerConnection = new RTCPeerConnection(config);

        // Añadir stream local si existe
        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }

        // Canal de datos para chat
        dataChannel = peerConnection.createDataChannel('chat');
        dataChannel.onopen = () => console.log('Canal abierto');
        dataChannel.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
        };

        // Manejar stream entrante
        peerConnection.ontrack = (event) => {
            if (!remoteStream) {
                remoteStream = new MediaStream();
                video.srcObject = remoteStream;
            }
            event.streams[0].getTracks().forEach(track => {
                remoteStream.addTrack(track);
            });
            video.play();
            updatePeerCount('add');
        };

        // ICE candidates
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                console.log('ICE candidate generado');
            }
        };

        // Crear oferta
        const offer = await peerConnection.createOffer({
            offerToReceiveVideo: true,
            offerToReceiveAudio: true
        });
        
        await peerConnection.setLocalDescription(offer);
        
        // Mostrar oferta para copiar
        document.getElementById('offerText').value = JSON.stringify(peerConnection.localDescription);
        
        isInitiator = true;
        showStep(1);
    }

    // ============================================
    // 3. PROCESAR OFERTA (RECEPTOR)
    // ============================================
    async function processOffer() {
        const offerText = document.getElementById('remoteOfferText').value;
        if (!offerText) return;

        const offer = JSON.parse(offerText);
        
        peerConnection = new RTCPeerConnection(config);

        // Canal de datos para chat
        peerConnection.ondatachannel = (event) => {
            dataChannel = event.channel;
            dataChannel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
            };
        };

        // Manejar stream entrante
        peerConnection.ontrack = (event) => {
            if (!remoteStream) {
                remoteStream = new MediaStream();
                video.srcObject = remoteStream;
            }
            event.streams[0].getTracks().forEach(track => {
                remoteStream.addTrack(track);
            });
            video.play();
            updatePeerCount('add');
        };

        await peerConnection.setRemoteDescription(offer);
        
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        document.getElementById('answerText').value = JSON.stringify(peerConnection.localDescription);
        
        showStep(3);
    }

    // ============================================
    // 4. PROCESAR RESPUESTA (INICIADOR)
    // ============================================
    async function processAnswer() {
        const answerText = document.getElementById('remoteAnswerText').value;
        if (!answerText) return;

        const answer = JSON.parse(answerText);
        await peerConnection.setRemoteDescription(answer);
        
        hideModal('signal');
        addChatMessage('🎬 Sistema', '¡Conectado! Calidad máxima', false);
    }

    // ============================================
    // FUNCIONES DE INTERFAZ
    // ============================================
    function showSignaling() {
        if (localStream) {
            // Somos emisor, crear conexión
            createConnection();
        }
        showModal('signal');
    }

    function showStep(step) {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.remove('active');
        document.getElementById('step4').classList.remove('active');
        document.getElementById(`step${step}`).classList.add('active');
    }

    function copyOffer() {
        const text = document.getElementById('offerText');
        text.select();
        document.execCommand('copy');
        alert('✅ Oferta copiada');
        showStep(2); // Siguiente paso: pegar oferta
    }

    function copyAnswer() {
        const text = document.getElementById('answerText');
        text.select();
        document.execCommand('copy');
        alert('✅ Respuesta copiada');
        showStep(4); // Siguiente paso: pegar respuesta
    }

    // ============================================
    // RESTO DE FUNCIONES (PLAY/PAUSE, CHAT, ETC)
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({type: 'chat', msg}));
        }
        
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count;
    }
</script>
</body>
</html>
