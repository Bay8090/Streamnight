<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamer P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --red: #ff0000; 
            --bg: #000; 
            --ui: rgba(15, 15, 15, 0.98); 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }
        
        .app { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
        }
        
        .video-box { 
            flex: 1; 
            position: relative; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
        }
        
        video { 
            width: 100%; 
            max-height: 100%; 
            background: #000;
        }
        
        /* Overlay de play/pause (5 segundos) */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }
        
        .play-overlay.visible {
            opacity: 1;
        }
        
        .play-icon {
            font-size: 80px;
            color: var(--red);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            animation: pulse 1s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Overlay de orientación */
        .orientation-warning {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--red);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid var(--red);
            display: none;
            z-index: 60;
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }
        
        .orientation-warning.visible {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        .overlay { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 15px; 
            pointer-events: none; 
            z-index: 10;
        }
        
        .top { 
            display: flex; 
            justify-content: space-between; 
            pointer-events: auto; 
        }
        
        .badge { 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px);
            padding: 8px 15px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 500;
            border: 1px solid #444; 
            letter-spacing: 0.5px;
        }
        
        .badge.red {
            background: var(--red);
            border-color: #ff4444;
        }
        
        .toolbar { 
            background: var(--ui); 
            backdrop-filter: blur(10px);
            padding: 15px 15px 35px 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333; 
            z-index: 100; 
        }
        
        .btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            border-radius: 12px; 
            background: #222; 
            color: #fff; 
            font-weight: 600; 
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
            background: #333;
        }
        
        .btn-main { 
            background: var(--red); 
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }
        
        .btn-main:active {
            background: #ff3333;
        }
        
        .panel { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(5px);
            display: none; 
            flex-direction: column; 
            z-index: 200; 
            padding: 20px; 
        }
        
        .panel.active { 
            display: flex; 
        }
        
        .panel-content { 
            background: #1a1a1a; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            margin: auto; 
            width: 100%;
            max-width: 400px;
            border: 1px solid #333; 
        }
        
        .panel-content h3 {
            margin-bottom: 15px;
            color: var(--red);
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #000; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 12px; 
            font-size: 14px;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--red);
        }
        
        #chatBox { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            border-bottom: 1px solid #333; 
            margin-bottom: 15px; 
            background: #0a0a0a;
            border-radius: 12px;
        }
        
        .msg { 
            margin-bottom: 10px; 
            font-size: 14px; 
            text-align: left; 
            line-height: 1.4;
        }
        
        .msg b { 
            color: var(--red); 
        }
        
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 45px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        
        .fullscreen-btn:hover {
            background: var(--red);
        }
        
        /* Botón de rotación */
        .rotate-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 45px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div class="app">
    <div class="video-box" id="vBox" onclick="togglePlay()">
        <video id="v" playsinline webkit-playsinline></video>
        
        <!-- Play/Pause Overlay -->
        <div class="play-overlay" id="playOverlay">
            <div class="play-icon" id="playIcon">▶️</div>
        </div>
        
        <!-- Orientation Warning -->
        <div class="orientation-warning" id="orientationWarning">
            🔄 Gira el dispositivo para mejor experiencia
        </div>
        
        <div class="overlay">
            <div class="top">
                <div class="badge" id="status">Iniciando...</div>
                <div class="badge red" id="peerCount">0 conectados</div>
            </div>
        </div>
        
        <!-- Fullscreen Button -->
        <button class="fullscreen-btn" onclick="toggleFullscreen(event)">⛶</button>
        
        <!-- Rotate Button -->
        <button class="rotate-btn" onclick="toggleOrientation(event)">🔄</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">
            📁 Transmitir
        </button>
        <button class="btn" onclick="showPanel('invite')">
            👥 Invitar
        </button>
        <button class="btn" onclick="showPanel('chat')">
            💬 Chat
        </button>
    </div>
</div>

<input type="file" id="file" hidden accept="video/*" onchange="startStream(event)">

<div id="invite" class="panel" onclick="closePanels()">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>🔗 Invitar Amigos</h3>
        <p style="font-size: 13px; color: #aaa; margin: 10px 0;">
            Comparte este enlace para que vean tu transmisión en vivo
        </p>
        <input type="text" id="link" readonly value="Generando...">
        <button class="btn btn-main" style="width: 100%;" onclick="copyLink()">
            📋 Copiar Enlace
        </button>
        <button class="btn" style="width: 100%; margin-top: 10px;" onclick="closePanels()">
            Cerrar
        </button>
    </div>
</div>

<div id="chat" class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="color: var(--red);">💬 Chat</h3>
        <button onclick="closePanels()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
    </div>
    <div id="chatBox"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msgIn" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn btn-main" onclick="send()" style="flex:0 0 60px;">➤</button>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    let peer, conns = [], myStream;
    let playTimeout;

    // ============================================
    // INICIALIZACIÓN
    // ============================================
    function init() {
        peer = new Peer();
        
        peer.on('open', id => {
            document.getElementById('status').innerHTML = `🟢 ONLINE · ${id.substring(0,6)}`;
            
            // Generar link de invitación
            const link = window.location.origin + window.location.pathname + '?id=' + id;
            document.getElementById('link').value = link;
            
            // Auto-conectar si hay ID en URL
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if(targetId && targetId !== id) {
                connectToHost(targetId);
            }
        });

        // Conexiones de datos (Chat)
        peer.on('connection', c => setupData(c));

        // Llamadas de video (Recibir Stream)
        peer.on('call', call => {
            call.answer();
            call.on('stream', remoteStream => {
                v.srcObject = remoteStream;
                v.play().catch(e => console.log('Autoplay bloqueado:', e));
            });
        });
        
        // Detectar orientación
        setupOrientation();
    }

    // ============================================
    // TRANSMITIR VIDEO
    // ============================================
    function startStream(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        // Crear URL y reproducir localmente
        const url = URL.createObjectURL(file);
        v.src = url;
        v.play();
        
        // Capturar el stream después de que cargue
        v.onloadedmetadata = () => {
            setTimeout(() => {
                try {
                    myStream = v.captureStream ? v.captureStream(30) : v.mozCaptureStream(30);
                    
                    // Enviar a todos los conectados
                    conns.forEach(conn => {
                        if(conn.open) {
                            const call = peer.call(conn.peer, myStream);
                            call.on('error', err => console.log('Error al enviar stream:', err));
                        }
                    });
                    
                    addMsg("Sistema", "🎬 Transmitiendo en vivo...");
                } catch(err) {
                    console.error('Error al capturar stream:', err);
                }
            }, 500);
        };
    }

    // ============================================
    // CONECTAR A HOST (VER)
    // ============================================
    function connectToHost(id) {
        const conn = peer.connect(id);
        setupData(conn);
    }

    // ============================================
    // CONFIGURAR CONEXIÓN DE DATOS
    // ============================================
    function setupData(conn) {
        conn.on('open', () => {
            conns.push(conn);
            updateCount();
            addMsg("Sistema", "🔗 Nuevo espectador conectado");
            
            // Si ya estamos transmitiendo, enviar stream
            if(myStream) {
                const call = peer.call(conn.peer, myStream);
                call.on('error', err => console.log('Error al enviar stream:', err));
            }
        });
        
        conn.on('data', data => {
            if(data.type === 'chat') {
                addMsg("Amigo", data.msg);
            } else if(data.type === 'control') {
                if(data.action === 'play') v.play();
                if(data.action === 'pause') v.pause();
            }
        });
        
        conn.on('close', () => {
            conns = conns.filter(c => c.peer !== conn.peer);
            updateCount();
            addMsg("Sistema", "👋 Espectador desconectado");
        });
    }

    // ============================================
    // PLAY/PAUSE TOGGLE CON OVERLAY (5 SEGUNDOS)
    // ============================================
    function togglePlay() {
        if(!v.srcObject && !v.src) return;
        
        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');
        
        if(v.paused) {
            v.play();
            icon.textContent = '▶️';
            
            // Notificar a todos
            conns.forEach(conn => {
                if(conn.open) conn.send({type: 'control', action: 'play'});
            });
        } else {
            v.pause();
            icon.textContent = '⏸️';
            
            // Notificar a todos
            conns.forEach(conn => {
                if(conn.open) conn.send({type: 'control', action: 'pause'});
            });
        }
        
        // Mostrar overlay
        overlay.classList.add('visible');
        
        // Ocultar después de 5 segundos
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            overlay.classList.remove('visible');
        }, 5000);
    }

    // ============================================
    // ORIENTACIÓN DE PANTALLA
    // ============================================
    function setupOrientation() {
        window.addEventListener('orientationchange', () => {
            const warning = document.getElementById('orientationWarning');
            
            if(window.orientation === 0 || window.orientation === 180) {
                // Vertical
                warning.classList.add('visible');
                setTimeout(() => warning.classList.remove('visible'), 3000);
            }
        });
        
        // Verificar al inicio
        setTimeout(() => {
            if(window.orientation === 0 || window.orientation === 180) {
                document.getElementById('orientationWarning').classList.add('visible');
                setTimeout(() => {
                    document.getElementById('orientationWarning').classList.remove('visible');
                }, 3000);
            }
        }, 1000);
    }
    
    function toggleOrientation(event) {
        event.stopPropagation();
        
        if(screen.orientation && screen.orientation.lock) {
            if(window.orientation === 0 || window.orientation === 180) {
                screen.orientation.lock('landscape').catch(e => console.log(e));
            } else {
                screen.orientation.lock('portrait').catch(e => console.log(e));
            }
        } else {
            alert('Usa la rotación automática del dispositivo');
        }
    }

    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        
        if(!document.fullscreenElement) {
            if(v.requestFullscreen) {
                v.requestFullscreen();
            } else if(v.webkitRequestFullscreen) {
                v.webkitRequestFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }

    // ============================================
    // FUNCIONES DE CHAT
    // ============================================
    function send() {
        const input = document.getElementById('msgIn');
        const msg = input.value.trim();
        if(!msg) return;
        
        addMsg("Tú", msg);
        
        conns.forEach(conn => {
            if(conn.open) conn.send({type: 'chat', msg: msg});
        });
        
        input.value = "";
    }

    function addMsg(user, msg) {
        const box = document.getElementById('chatBox');
        box.innerHTML += `<div class="msg"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // ============================================
    // FUNCIONES DE INTERFAZ
    // ============================================
    function updateCount() {
        document.getElementById('peerCount').innerHTML = `👥 ${conns.length} conectados`;
    }

    function showPanel(id) { 
        document.getElementById(id).classList.add('active'); 
    }
    
    function closePanels() { 
        document.getElementById('invite').classList.remove('active'); 
        document.getElementById('chat').classList.remove('active'); 
    }

    function copyLink() {
        const link = document.getElementById('link');
        link.select();
        document.execCommand('copy');
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = '✅ Copiado!';
        setTimeout(() => btn.innerText = originalText, 2000);
    }

    // Iniciar
    window.onload = init;
</script>
</body>
</html>
