<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamnight · 4K REAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Botones flotantes */
        .float-btn {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: red;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #playPauseBtn { left: 20px; }
        #fullscreenBtn { right: 20px; }
        
        /* Overlay play/pause */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }
        .play-overlay.visible { opacity: 1; }
        .play-icon { font-size: 100px; color: white; }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid red;
            z-index: 10;
        }
        #status { left: 15px; }
        #peerCount { right: 15px; }
        
        /* Badge 4K SIN COMPRESIÓN */
        .quality-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid white;
            z-index: 10;
            white-space: nowrap;
        }
        
        .toolbar {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid red;
        }
        .btn {
            flex: 1;
            padding: 16px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-red { background: red; }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid red;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        .message.own { background: red; text-align: right; }
    </style>
</head>
<body>

<div class="video-container" onclick="togglePlay(event)">
    <video id="video" playsinline></video>
    
    <div class="play-overlay" id="playOverlay">
        <div class="play-icon" id="playIcon">▶️</div>
    </div>
    
    <button class="float-btn" id="playPauseBtn" onclick="togglePlay(event)">▶️</button>
    <button class="float-btn" id="fullscreenBtn" onclick="toggleFullscreen(event)">⛶</button>
    
    <div class="badge" id="status">Iniciando...</div>
    <div class="badge" id="peerCount">0</div>
    
    <div class="quality-badge" id="qualityBadge">⚡ 4K SIN COMPRESIÓN ⚡</div>
</div>

<div class="toolbar">
    <input type="file" id="fileInput" hidden accept="video/*" onchange="startStream()">
    <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">📹 EMITIR 4K</button>
    <button class="btn" onclick="showModal('invite')">🔗 INVITAR</button>
    <button class="btn" onclick="showModal('chat')">💬 CHAT</button>
</div>

<div id="inviteModal" class="modal" onclick="hideModal('invite')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">🔗 COMPARTIR 4K</h3>
        <p style="color:#888;">CALIDAD ORIGINAL · SIN COMPRESIÓN</p>
        <input type="text" id="inviteLink" readonly>
        <button onclick="copyLink()" style="width:100%; background:red; color:white; border:none; padding:15px;">COPIAR</button>
    </div>
</div>

<div id="chatModal" class="modal" onclick="hideModal('chat')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:red;">💬 CHAT</h3>
        <div id="chatMessages"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="Mensaje..." style="flex:1;">
            <button onclick="sendMessage()" style="background:red; color:white; border:none; width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // WEBRTC PURO - MÁXIMA CALIDAD
    // ============================================
    const video = document.getElementById('video');
    let peerConnection;
    let dataChannel;
    let localStream = null;
    let isBroadcaster = false;
    let connections = [];
    let playTimeout;

    // Configuración para MÁXIMA CALIDAD
    const peerConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    // ============================================
    // INICIAR COMO BROADCASTER
    // ============================================
    async function startStream() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        try {
            // Reproducir video local
            video.src = URL.createObjectURL(file);
            await video.play();
            document.getElementById('playPauseBtn').innerText = '⏸️';

            // Esperar a que cargue metadata
            await new Promise(resolve => video.onloadedmetadata = resolve);

            // Capturar stream con MÁXIMA CALIDAD
            if (video.captureStream) {
                localStream = video.captureStream(60); // 60fps
            } else if (video.mozCaptureStream) {
                localStream = video.mozCaptureStream(60);
            }

            // Configurar tracks para MÁXIMA CALIDAD
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                // Forzar resolución original y bitrate alto
                await videoTrack.applyConstraints({
                    width: { exact: video.videoWidth },
                    height: { exact: video.videoHeight },
                    frameRate: { exact: 60 }
                }).catch(e => console.log('No se pudo forzar resolución'));
            }

            // Crear PeerConnection para broadcast
            peerConnection = new RTCPeerConnection(peerConfig);
            
            // Añadir tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Crear canal de datos para chat/control
            dataChannel = peerConnection.createDataChannel('control');
            dataChannel.onopen = () => console.log('Canal de datos abierto');
            dataChannel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
            };

            // Crear oferta
            const offer = await peerConnection.createOffer({
                offerToReceiveVideo: false,
                offerToReceiveAudio: false
            });
            
            await peerConnection.setLocalDescription(offer);

            // Generar código de invitación
            const offerString = btoa(JSON.stringify(peerConnection.localDescription));
            const baseUrl = window.location.href.split('?')[0];
            const inviteUrl = baseUrl + '?offer=' + offerString;
            document.getElementById('inviteLink').value = inviteUrl;

            isBroadcaster = true;
            addChatMessage('🎬 4K', 'Transmisión SIN COMPRESIÓN iniciada', false);

        } catch (error) {
            console.error('Error:', error);
            alert('Error al iniciar transmisión');
        }
    }

    // ============================================
    // CONECTAR COMO VIEWER
    // ============================================
    async function connectToBroadcaster(offerString) {
        try {
            const offer = JSON.parse(atob(offerString));
            
            peerConnection = new RTCPeerConnection(peerConfig);
            
            // Canal de datos para chat
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                dataChannel.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'chat') addChatMessage('Amigo', data.msg, false);
                };
            };

            // Recibir stream
            peerConnection.ontrack = (event) => {
                video.srcObject = event.streams[0];
                video.play();
                updatePeerCount('add');
            };

            await peerConnection.setRemoteDescription(offer);
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            // Enviar respuesta (simplificado - en producción necesitarías signaling)
            console.log('Respuesta:', btoa(JSON.stringify(answer)));

        } catch (error) {
            console.error('Error conectando:', error);
        }
    }

    // ============================================
    // VERIFICAR URL AL INICIAR
    // ============================================
    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const offerParam = urlParams.get('offer');
        
        if (offerParam) {
            // Somos viewer
            document.getElementById('status').innerText = 'Conectando...';
            connectToBroadcaster(offerParam);
        } else {
            // Somos broadcaster potencial
            const id = Math.random().toString(36).substring(7);
            document.getElementById('status').innerText = 'ID: ' + id;
        }
    }

    // ============================================
    // PLAY/PAUSE
    // ============================================
    function togglePlay(event) {
        if (event.target.classList.contains('btn')) return;
        if (!video.srcObject && !video.src) return;

        const overlay = document.getElementById('playOverlay');
        const icon = document.getElementById('playIcon');

        if (video.paused) {
            video.play();
            icon.innerText = '▶️';
            document.getElementById('playPauseBtn').innerText = '⏸️';
        } else {
            video.pause();
            icon.innerText = '⏸️';
            document.getElementById('playPauseBtn').innerText = '▶️';
        }

        overlay.classList.add('visible');
        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    // ============================================
    // PANTALLA COMPLETA
    // ============================================
    function toggleFullscreen(event) {
        event.stopPropagation();
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // ============================================
    // CHAT
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        addChatMessage('Tú', msg, true);
        
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({type: 'chat', msg}));
        }
        
        input.value = '';
    }

    function addChatMessage(user, msg, isOwn) {
        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><b>${user}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // ============================================
    // INTERFAZ
    // ============================================
    function showModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
    function hideModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }
    
    function copyLink() {
        const link = document.getElementById('inviteLink');
        link.select();
        document.execCommand('copy');
        alert('✅ Enlace copiado');
    }

    function updatePeerCount(action) {
        const el = document.getElementById('peerCount');
        let count = parseInt(el.innerText) || 0;
        if (action === 'add') count++;
        if (action === 'remove' && count > 0) count--;
        el.innerText = count + ' 👥';
    }

    window.onload = init;
</script>
</body>
</html>
